/* ═══════════════════════════════════════════════════════════
   UNIFIED SOLICITUD DETAIL — handles all 9 credit states
   ═══════════════════════════════════════════════════════════ */
function pgSolicitudDetail(){
  const sol=state.viewingSolicitud;
  if(!sol)return`<div class="card"><p>Error</p></div>`;
  const es=state.lang==='es';
  const s=sol.status||'analysis';
  const isCash=sol.action==='cash';
  const isPre=sol.action==='preapprove'||sol.action==='limitIncrease';
  const isLimitInc=sol.action==='limitIncrease';
  const isMerc=sol.action==='cart';
  const billingStatus=sol.billingStatus||null;
  const isBilled=billingStatus==='billed';

  // ── Resolve display state ──────────────────────────────────
  let displayState=s;
  if(s==='approved'||s==='approved_pending_id'){
    if(isLimitInc)                                               displayState='activated';
    // approved_pending_id = biometric verification for NEW line only (outcome !== 2)
    // outcome 2 = already has line → OTP done before this screen → go straight to pending_billing
    else if(s==='approved_pending_id'&&sol.outcome!==2)         displayState='approved_pending_id';
    else if(billingStatus==='activated')                        displayState='activated';
    else if(isBilled)                                           displayState='billed';
    else                                                        displayState='pending_billing';
  }
  // limitIncrease can only be: analysis, analysis_visit, observed, rejected, activated
  if(isLimitInc&&!['analysis','analysis_visit','observed','rejected','activated'].includes(displayState)){
    displayState='activated';
  }

  // ── State config ───────────────────────────────────────────
  const STATES={
    analysis:          {color:'var(--warning)',   bg:'var(--warning-light)',   border:'var(--warning-border)', icon:'clock',         label:es?'En análisis':'Under review'},
    analysis_visit:    {color:'var(--primary)',   bg:'var(--primary-light)',   border:'#C5D0F0',               icon:'mapPin',        label:es?'En análisis — Visita agendada':'Under review — Visit scheduled'},
    observed:          {color:'var(--orange)',    bg:'var(--orange-light)',     border:'#F5C9A8',               icon:'alertTriangle', label:es?'Observada':'Observed'},
    rejected:          {color:'var(--danger)',    bg:'#FEF0F0',                 border:'#F5B4BA',               icon:'x',             label:es?'Rechazada':'Rejected'},
    approved_pending_id:{color:'var(--warning)', bg:'var(--warning-light)',   border:'var(--warning-border)', icon:'smartphone',   label:es?'Pendiente Verificación Biométrica':'Pending Biometric Verification'},
    pending_billing:   {color:'var(--success)',  bg:'var(--success-light)',    border:'var(--success-border)', icon:'checkCircle',   label:es?'Pendiente facturar':'Pending billing'},
    activated:         {color:'var(--success)',  bg:'var(--success-light)',    border:'var(--success-border)', icon:'checkCircle',   label:es?'Línea activada':'Line activated'},
    billed:            {color:'#0D9B68',          bg:'#E6F7F1',                 border:'#A8DFC9',               icon:'receipt',       label:es?'Facturada':'Billed'},
  };
  const st=STATES[displayState]||STATES.analysis;

  // ── Operational titles per state ───────────────────────────
  const opTitles={
    analysis:           isLimitInc?(es?'Incremento enviado a análisis':'Increase sent for review'):(es?'Solicitud enviada a análisis':'Application sent for review'),
    analysis_visit:     isLimitInc?(es?'Incremento en análisis — visita agendada':'Increase under review — visit scheduled'):(es?'Visita de verificación agendada':'Verification visit scheduled'),
    observed:           isLimitInc?(es?'Incremento observado — acción requerida':'Increase observed — action required'):(es?'Solicitud observada — acción requerida':'Application observed — action required'),
    rejected:           isLimitInc?(es?'Incremento no aprobado':'Increase not approved'):(es?'Solicitud no aprobada':'Application not approved'),
    approved_pending_id:es?'Crédito aprobado — verificación biométrica pendiente':'Credit approved — biometric verification pending',
    pending_billing:    isPre?(es?'Listo para formalizar la línea':'Ready to formalize the line'):(es?'Listo para procesar en caja':'Ready to process at checkout'),
    activated:          isLimitInc?(es?'Incremento de línea aprobado':'Line increase approved'):(es?'Línea de crédito activada':'Credit line activated'),
    billed:             isCash?(es?'Préstamo procesado':'Loan processed'):(es?'Crédito formalizado':'Credit formalized'),
  };
  const opDescs={
    analysis:           isLimitInc?(es?'El equipo de crédito está evaluando la solicitud de incremento. Tiempo estimado: 24–48 horas hábiles.':'The credit team is reviewing the increase request. Estimated time: 24–48 business hours.'):(es?'El equipo de crédito está evaluando esta solicitud. Tiempo estimado: 24–48 horas hábiles.':'The credit team is reviewing this application. Estimated time: 24–48 business hours.'),
    analysis_visit:     isLimitInc?(es?'Se realizará una visita de verificación antes de aprobar el incremento.':'A verification visit will be made before approving the increase.'):(es?'Se realizará una visita de verificación antes de tomar la decisión final. Recibirás una notificación con el resultado.':'A verification visit will be made before the final decision. You will receive a notification with the result.'),
    observed:           es?'El analista identificó información que debe ser corregida o completada antes de continuar.':'The analyst identified information that must be corrected or completed before proceeding.',
    rejected:           isLimitInc?(es?'Tras el análisis, no fue posible aprobar el incremento de línea en esta ocasión.':'After the analysis, it was not possible to approve the line increase at this time.'):(es?'Tras el análisis, no fue posible aprobar el crédito en esta ocasión.':'After the analysis, it was not possible to approve the credit at this time.'),
    approved_pending_id:es?'El crédito fue aprobado y la línea está lista para activarse. El cliente es nuevo y debe completar una verificación biométrica antes de proceder. Se enviará un enlace de validación por SMS.':'The credit was approved and the line is ready to activate. The customer is new and must complete a biometric verification before proceeding. A validation link will be sent by SMS.',
    pending_billing:    isPre?(es?'Línea de crédito aprobada. Imprimí el contrato y obtené la firma del cliente para activarla.':'Credit line approved. Print the contract and obtain the customer\'s signature to activate it.'):(es?'Crédito aprobado e identidad verificada. Llevá al cliente a caja para completar el proceso.':'Credit approved and identity verified. Take the customer to checkout to complete the process.'),
    activated:          es?'La línea de crédito está activa. El cliente puede usarla en tienda.':'The credit line is active. The customer can use it in store.',
    billed:             isCash?(es?'El préstamo fue procesado. No hay acciones pendientes.':'The loan was processed. No pending actions.'):(es?'Crédito aprobado, identidad verificada y venta facturada. No hay acciones pendientes.':'Credit approved, identity verified and sale billed. No pending actions.'),
  };

  // ── ZONA 1: Estado ─────────────────────────────────────────
  const zona1=`
    <div style="border-radius:var(--radius-sm);background:${st.bg};border:1px solid ${st.border};margin-bottom:16px;overflow:hidden;">
      <div style="padding:14px 16px;display:flex;align-items:flex-start;gap:12px;">
        <div style="width:36px;height:36px;border-radius:50%;background:white;border:1.5px solid ${st.border};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon(st.icon,18,st.color)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;">${opTitles[displayState]||opTitles.analysis}</div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${opDescs[displayState]||opDescs.analysis}</div>
        </div>
      </div>
      <div style="padding:8px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid ${st.border};">
        <div style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;background:white;border:1px solid ${st.border};font-size:10px;font-weight:700;color:${st.color};">${icon(st.icon,10,st.color)} ${st.label}</div>
        <div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);">${sol.ref} · ${sol.date}</div>
      </div>
    </div>`;

  // ── ZONA TERMS: Condiciones del crédito ──────────────────
  let zonaTerms='';
  const ct=sol.creditTerms;
  if(ct&&!isPre){
    const primaLabel=displayState==='billed'?(es?'Prima pagada':'Down payment paid'):(es?'Prima a pagar':'Down payment due');
    zonaTerms=`<div style="border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">
      <div style="padding:8px 16px;background:var(--surface-alt);border-bottom:1px solid var(--border);">
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">${es?'Condiciones del Crédito':'Credit Terms'}</span>
      </div>
      <div style="padding:0 16px;font-size:12px;">
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
          <span style="color:var(--text-secondary);">${es?'Monto a financiar':'Financed amount'}</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--text);">Q${ct.montoFinanciar.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);">
          <div style="padding:8px 0;border-right:1px solid var(--border);padding-right:8px;">
            <div style="color:var(--text-dim);font-size:10px;">${es?'Plazo':'Term'}</div>
            <div style="font-family:var(--mono);font-weight:700;color:var(--text);">${ct.plazo} ${es?'meses':'mo'}</div>
          </div>
          <div style="padding:8px 0 8px 8px;">
            <div style="color:var(--text-dim);font-size:10px;">${es?'Tasa anual':'Annual rate'}</div>
            <div style="font-family:var(--mono);font-weight:700;color:var(--text);">${(ct&&ct.tasa||0).toFixed(1)}%</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:${ct.cpi>0||sol.prima>0?'1px solid var(--border)':'none'};">
          <div style="padding:8px 0;border-right:1px solid var(--border);padding-right:8px;">
            <div style="color:var(--text-dim);font-size:10px;">${es?'Período de gracia':'Grace period'}</div>
            <div style="font-family:var(--mono);font-weight:700;color:var(--text);">${ct.gracia>0?ct.gracia+' '+(es?'mes':'mo'):(es?'Sin gracia':'None')}</div>
          </div>
          <div style="padding:8px 0 8px 8px;">
            <div style="color:var(--text-dim);font-size:10px;">${es?'Cuota mensual':'Monthly payment'}</div>
            <div style="font-family:var(--mono);font-weight:700;color:var(--text);">Q${(ct.cuotaTotal||0).toFixed(2)}</div>
          </div>
        </div>
        ${ct.cpi>0?`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:${sol.prima>0?'1px solid var(--border)':'none'};">
          <span style="color:var(--text-secondary);">${es?'Seguro CPI':'CPI Insurance'}</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--text);">Q${(ct.cpi||0).toFixed(2)}/${es?'mes':'mo'}</span>
        </div>`:''}
        ${sol.prima>0?`<div style="display:flex;justify-content:space-between;padding:8px 0;">
          <span style="color:var(--text-secondary);">${primaLabel}</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--text);">Q${(sol.prima||0).toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>`:''}
      </div>
    </div>`;
  }

  // ── ZONA 2: Qué se lleva el cliente ───────────────────────
  let zona2='';

  if(isMerc){
    const items=sol.cartItems||[];
    const dc=sol.deliveryCost||0;
    if(items.length>0){
      const subtotal=items.reduce((s,it)=>s+(it.price||0)+(it.warranty?it.warranty.price||0:0),0);
      const total=subtotal+dc;
      zona2=`<div style="border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">
        <div style="padding:8px 16px;background:var(--surface-alt);border-bottom:1px solid var(--border);">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">${es?'Artículos':'Items'}</span>
        </div>
        <div style="padding:12px 16px;">
          ${items.map((it,idx)=>{
            const w=it.warranty?it.warranty.price||0:0;
            const tot=(it.price||0)+w;
            const isLast=idx===items.length-1;
            return`<div style="display:flex;align-items:flex-start;gap:10px;${isLast?'':'padding-bottom:10px;margin-bottom:10px;border-bottom:1px dashed var(--border);'}">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3;">${it.name}</div>
                ${it.creditPromo?`<div style="font-size:10px;color:var(--success);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:3px;">${icon('tag',10,'var(--success)')} ${es?'Promo crédito':'Credit promo'} -${it.promoRate?Math.round(it.promoRate*100)+'%':'10%'}</div>`:''}
                ${w>0?`<div style="font-size:11px;color:var(--text-dim);margin-top:3px;display:flex;align-items:center;gap:3px;">${icon('shield',10,'var(--success)')} ${es?'Garantía ext.':'Ext. warranty'} <span style="font-family:var(--mono);">Q${(w||0).toFixed(2)}</span></div>`:''}
              </div>
              <div style="text-align:right;flex-shrink:0;">
                ${it.creditPromo&&it.originalPrice?`<div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);text-decoration:line-through;">Q${(it.originalPrice+w).toLocaleString('en',{minimumFractionDigits:2})}</div>`:''}
                <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${it.creditPromo?'var(--success)':'var(--text)'};">Q${tot.toLocaleString('en',{minimumFractionDigits:2})}</div>
              </div>
            </div>`;
          }).join('')}
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);">
            ${items.some(it=>it.creditPromo&&it.originalPrice)?`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--success);font-weight:600;margin-bottom:4px;"><span>${es?'Ahorro con crédito':'Credit savings'}</span><span style="font-family:var(--mono);">-Q${items.reduce((s,it)=>s+(it.creditPromo&&it.originalPrice?(it.originalPrice-it.price):0),0).toFixed(2)}</span></div>`:''}
            ${dc>0?`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:4px;"><span>${es?'Envío a domicilio':'Home delivery'}</span><span style="font-family:var(--mono);">Q${(dc||0).toFixed(2)}</span></div>`:''}
            <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--text);"><span>TOTAL</span><span style="font-family:var(--mono);">Q${total.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
          </div>
        </div>
      </div>`;
    }

              <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">${es?'Mercadería':'Goods'}</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);">Q${limitMerc.toLocaleString('en')}</div>

            <div style="padding:10px;border-radius:var(--radius-sm);background:var(--white);border:1px solid #C5D0F0;text-align:center;">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">Cash</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);">Q${limitCash.toLocaleString('en')}</div>

          <div style="margin-top:8px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--white);border:1px solid #C5D0F0;display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;">${es?'Cuota máx. mensual':'Max monthly payment'}</div>
            <div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--primary);">Q${(maxCuota||0).toFixed(2)}</div>
          </div>
        </div>
        <div style="border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);padding:14px 16px;">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;">${es?'Pasos a seguir':'Steps to follow'}</div>
          ${[
            es?'Imprimir contrato de línea de crédito':'Print credit line contract',
            es?'Obtener firma del cliente en los documentos':'Obtain customer signature on documents',
            es?'La línea queda activa para futuras compras en tienda':'The line becomes active for future in-store purchases'
          ].map((text,i)=>`<div style="display:flex;align-items:flex-start;gap:10px;${i<2?'margin-bottom:12px;':''}">
            <div style="width:24px;height:24px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;">${i+1}</div>
            <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;padding-top:3px;">${text}</div>
          </div>`).join('')}
        </div>`;
    } else {
    const prima=sol.prima||0;
    const hasPrima=prima>0;
    if(hasPrima){
      zona3+=`<div style="border-radius:var(--radius-sm);border:1.5px solid var(--primary);background:var(--primary-light);padding:14px 16px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--primary);">${es?'Prima a cobrar':'Down payment due'}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${es?'Cobrar antes de entregar el producto':'Collect before delivering the product'}</div></div>
          <div style="font-family:var(--mono);font-size:28px;font-weight:800;color:var(--primary);">Q${prima.toLocaleString('en',{minimumFractionDigits:2})}</div>
        </div>
      </div>`;
    } else if(!isCash){
      zona3+=`<div style="border-radius:var(--radius-sm);background:var(--success-light);border:1px solid var(--success-border);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span style="display:flex;color:var(--success);">${icon('checkCircle',14)}</span>
        <div style="font-size:12px;font-weight:700;color:var(--success);">${es?'Sin prima — Crédito al 100%':'No down payment — 100% credit'}</div>
      </div>`;
    }
    const steps=isCash
      ?[{n:1,text:es?'Imprimir y firmar documentación del préstamo':'Print and sign loan documentation'},{n:2,text:es?'El sistema de caja procesa el desembolso':'The POS system processes the disbursement'}]
      :hasPrima
      ?[{n:1,text:es?`Cobrar prima Q${prima.toLocaleString('en',{minimumFractionDigits:2})} al cliente`:`Collect Q${prima.toLocaleString('en',{minimumFractionDigits:2})} down payment`},{n:2,text:es?'Imprimir y firmar documentación del crédito':'Print and sign credit documentation'},{n:3,text:es?'El sistema de caja factura y entrega el producto':'The POS system bills and delivers the product'}]
      :[{n:1,text:es?'Imprimir y firmar documentación del crédito':'Print and sign credit documentation'},{n:2,text:es?'El sistema de caja factura y entrega el producto':'The POS system bills and delivers the product'}];
    zona3+=`<div style="border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);padding:14px 16px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;">${es?'Pasos a seguir':'Steps to follow'}</div>
      ${steps.map((step,i)=>`<div style="display:flex;align-items:flex-start;gap:10px;${i<steps.length-1?'margin-bottom:12px;':''}">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;">${step.n}</div>
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;padding-top:3px;">${step.text}</div>
      </div>`).join('')}
    </div>`;
    } // end else (not isPre)
    // Download line contract button — for all new line transactions
    const isNewLine=sol.outcome!==2;
    if(isNewLine){
      zona3=`<button class="btn btn-secondary" id="btnDownloadLineContract" style="width:100%;justify-content:center;display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;">${icon('download',16)} ${es?'Descargar contrato de línea':'Download line contract'}</button>`+zona3;
    }
    footerCTA=`<div class="btn-row" style="justify-content:center;margin-top:20px;"><button class="btn btn-secondary" onclick="backFromDetail();">${t('btnBack')}</button></div>`;
  }

  else if(displayState==='activated'){
    if(isLimitInc){
      zona3=`
        <div style="border-radius:var(--radius-sm);background:var(--success-light);border:1px solid var(--success-border);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">
          <div style="width:36px;height:36px;border-radius:50%;background:white;border:2px solid var(--success);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon('check',18,'var(--success)')}</div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;">${es?'Los nuevos límites ya están activos. El cliente puede utilizar su línea con la capacidad incrementada.':'The new limits are now active. The customer can use their line with the increased capacity.'}</div>
        </div>
        <button class="btn btn-secondary" id="btnDownloadContract" style="width:100%;justify-content:center;display:inline-flex;align-items:center;gap:8px;">${icon('download',16)} ${es?'Descargar contrato de nueva línea':'Download new line contract'}</button>`;
    } else {
      zona3=`
        <button class="btn btn-secondary" id="btnDownloadContract" style="width:100%;justify-content:center;display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;">${icon('download',16)} ${es?'Descargar contrato de línea':'Download line contract'}</button>
        <div style="border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);padding:14px 16px;">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;">${es?'¿El cliente quiere usar su línea ahora?':'Does the customer want to use their line now?'}</div>
          <div style="display:grid;gap:8px;">
            <button class="btn btn-primary" id="btnActivatedStartCart" style="width:100%;justify-content:center;display:inline-flex;align-items:center;gap:8px;">${icon('shoppingCart',16,'white')} ${es?'Agregar artículos al carrito':'Add items to cart'}</button>
            <button class="btn btn-secondary" id="btnActivatedStartCash" style="width:100%;justify-content:center;display:inline-flex;align-items:center;gap:8px;">${icon('banknote',16)} ${es?'Solicitar préstamo en efectivo':'Request cash loan'}</button>
          </div>
        </div>`;
    }
    footerCTA=`<div class="btn-row" style="justify-content:center;margin-top:20px;"><button class="btn btn-secondary" onclick="backFromDetail();">${t('btnBack')}</button></div>`;
  }

  else if(displayState==='billed'){
    zona3=`<div style="border-radius:var(--radius-sm);background:var(--success-light);border:1px solid var(--success-border);padding:14px 16px;display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:50%;background:white;border:2px solid var(--success);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon('check',18,'var(--success)')}</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;">${isCash?(es?'El préstamo fue procesado. No hay acciones pendientes.':'The loan was processed. No pending actions.'):(es?'Crédito aprobado, identidad verificada y venta facturada. No hay acciones pendientes.':'Credit approved, identity verified and sale billed. No pending actions.')}</div>
    </div>`;
    footerCTA=`<div class="btn-row" style="justify-content:center;margin-top:20px;"><button class="btn btn-secondary" onclick="backFromDetail();">${t('btnBack')}</button></div>`;
  }

  return`<div class="card" style="padding:16px;">
    ${zona1}
    ${zonaTerms}
    ${zona2}
    ${zona3?`<div style="margin-top:4px;">${zona3}</div>`:''}
    ${footerCTA}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   UNIFIED VENTA DETAIL — handles pending_billing + billed
   ═══════════════════════════════════════════════════════════ */
function pgVentaDetail(){
  const es=state.lang==='es';
  // Works for both immediate flow (state._contadoSaleRef) and dashboard (state._viewingSale)
  let sale=state._viewingSale;
  // If coming from immediate checkout flow, build a synthetic sale object
  if(!sale&&state._contadoSaleRef){
    const items=state.salesCartItems||[];
    const deliveryCost=state.salesShipMethod==='home'?39:0;
    const subtotal=items.reduce((s,it)=>s+(it.price||0)+(it.warranty?it.warranty.price||0:0),0);
    const total=subtotal+deliveryCost;
    sale={
      ref:state._contadoSaleRef,
      client:state.salesCustomer?state.salesCustomer.name:'Cliente',
      date:(()=>{const d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+(String(d.getMonth()+1).padStart(2,'0'))+'/'+d.getFullYear();})(),
      amount:'Q'+total.toLocaleString('en',{minimumFractionDigits:2}),
      items:items.map(it=>it.name).join(', '),
      billingStatus:'pending_billing',
      _items:items,
      _subtotal:subtotal,
      _deliveryCost:deliveryCost,
      _total:total,
    };
  }
  if(!sale)return`<div class="card"><p>Error</p></div>`;

  const isBilled=sale.billingStatus==='billed';
  const isImmediate=!!state._contadoSaleRef&&!state._viewingSale;

  // ── Hero ───────────────────────────────────────────────────
  const heroTitle=isBilled?(es?'Venta Completada':'Sale Completed'):(es?'Venta Registrada':'Sale Registered');
  const heroBg=isBilled?'var(--success-light)':'var(--primary-light)';
  const heroBorder=isBilled?'var(--success)':'var(--primary)';
  const heroIconName=isBilled?'receipt':'shoppingCart';
  const heroIconColor=isBilled?'var(--success)':'var(--primary)';

  // ── Items detail ───────────────────────────────────────────
  let itemsSection='';
  if(sale._items&&sale._items.length>0){
    itemsSection=`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;">${es?'Artículos':'Items'} (${sale._items.length})</div>
      ${sale._items.map(it=>{
        const w=it.warranty?it.warranty.price||0:0;
        const tot=(it.price||0)+w;
        return`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed var(--border);">
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.name}</div>
            ${it.creditPromo?`<div style="font-size:10px;color:var(--success);font-weight:600;margin-top:1px;display:flex;align-items:center;gap:3px;">${icon('tag',9,'var(--success)')} ${es?'Promo crédito':'Credit promo'} -${it.promoRate?Math.round(it.promoRate*100)+'%':'10%'}</div>`:''}
            ${w>0?`<div style="font-size:10px;color:var(--text-dim);margin-top:1px;">+ ${es?'Garantía ext.':'Ext. warranty'} Q${(w||0).toFixed(2)}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            ${it.creditPromo&&it.originalPrice?`<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);text-decoration:line-through;">Q${((it.originalPrice||0)+w).toLocaleString('en',{minimumFractionDigits:2})}</div>`:''}
            <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:${it.creditPromo?'var(--success)':'var(--text)'};">Q${tot.toLocaleString('en',{minimumFractionDigits:2})}</div>
          </div>
        </div>`;
      }).join('')}
      ${sale._deliveryCost>0?`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:4px;"><span>${es?'Envío':'Shipping'}</span><span style="font-family:var(--mono);">Q${(sale._deliveryCost||0).toFixed(2)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-top:6px;border-top:1px solid var(--border);"><span>TOTAL</span><span style="font-family:var(--mono);">Q${sale._total.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
    </div>`;
  } else if(sale.items){
    itemsSection=`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;">
      <div style="font-size:12px;color:var(--text);line-height:1.6;">${sale.items}</div>
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-top:8px;margin-top:8px;border-top:1px solid var(--border);"><span>TOTAL</span><span style="font-family:var(--mono);">${sale.amount}</span></div>
    </div>`;
  }

  // ── Status badge ───────────────────────────────────────────
  const bl=isBilled
    ?{color:'#0D9B68',bg:'#E6F7F1',border:'#A8DFC9',icon:'receipt',label:t('dashStatusBilled')}
    :{color:'var(--warning)',bg:'var(--warning-light)',border:'var(--warning-border)',icon:'clock',label:t('dashStatusPendingBill')};

  // ── Context section ────────────────────────────────────────
  const contextSection=isBilled
    ?`<div style="padding:14px 16px;border-radius:var(--radius-sm);background:var(--success-light);border:1px solid var(--success-border);display:flex;align-items:center;gap:10px;">
        <span style="display:flex;color:var(--success);">${icon('checkCircle',18,'var(--success)')}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--success);">${es?'Venta facturada':'Sale billed'}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${es?'No hay acciones pendientes para esta venta.':'No pending actions for this sale.'}</div>
        </div>
      </div>`
    :`<div style="padding:14px 16px;border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--border);">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">${es?'Próximos pasos':'Next steps'}</div>
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;">1</div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;">${es?'Cobrar al cliente en caja':'Collect from customer at checkout'} <strong style="font-family:var(--mono);">${sale.amount||('Q'+(sale._total||0).toLocaleString('en',{minimumFractionDigits:2}))}</strong></div>
        </div>
      </div>`;

  // ── Footer ─────────────────────────────────────────────────
  const footer=isImmediate
    ?`<div class="btn-row" style="justify-content:center;margin-top:16px;"><button class="btn btn-secondary" id="btnRestart">${t('btnNewQuery')}</button></div>`
    :`<div class="btn-row" style="justify-content:center;margin-top:16px;"><button class="btn btn-secondary" id="btnSaleDetailBack">${es?'Regresar':'Go back'}</button></div>`;

  return`<div class="card"><div class="success-screen">
    <div class="success-circle" style="background:${heroBg};border-color:${heroBorder};">${icon(heroIconName,28,heroIconColor)}</div>
    <div class="success-title">${heroTitle}</div>
    <div style="margin:20px auto 0;max-width:460px;text-align:left;">
      <div style="padding:14px 16px;border-radius:var(--radius-sm);background:var(--surface-alt);border:1px solid var(--border);margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">${es?'No. Referencia':'Reference No.'}</span>
          <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--primary);">${sale.ref}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--text-dim);">${es?'Cliente':'Customer'}</span><span style="font-weight:700;">${sale.client}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:var(--text-dim);">${es?'Fecha':'Date'}</span><span style="font-weight:600;">${sale.date}</span></div>
        ${itemsSection}
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);background:${bl.bg};border:1px solid ${bl.border};margin-bottom:14px;">
        <span style="display:flex;color:${bl.color};">${icon(bl.icon,14,bl.color)}</span>
        <span style="font-size:12px;font-weight:700;color:${bl.color};">${bl.label}</span>
      </div>
      ${contextSection}
    </div>
    ${footer}
  </div></div>`;
}

function pgSalesScenario(){
  const es=state.lang==='es';

    ?`state._scenarioFromOrigination=false;state.screen='identify';render();`
    :`state.screen='salesIdentify';state.salesScenario=null;render();`;

  // Badge styles per scenario
  const badges={
    new:          {label:'NUEVO',          bg:'#F1EFE8',color:'#444441'},
    existingNoCredit:{label:'SIN EVALUAR', bg:'#F1EFE8',color:'#444441'},
    existingPrequal: {label:'PRE-CALIFICADO',bg:'#E8F7F1',color:'#0A6B48'},
    existingLegacy:  {label:'SIN LÍNEA',   bg:'#EEEDFE',color:'#3C3489'},
    inAnalysis:      {label:'EN ANÁLISIS', bg:'#FEF4E6',color:'#7A4A0A'},
    inAnalysisVisit: {label:'EN ANÁLISIS · VISITA',bg:'#FEF4E6',color:'#7A4A0A'},

    existingLegacyPastDue:{label:'SIN LÍNEA · MORA',bg:'#FEF0E6',color:'#7A3A0A'},
  };

  function badgeHtml(key){
    const b=badges[key]||{label:key,bg:'#F1EFE8',color:'#444441'};
    return`<span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:${b.bg};color:${b.color};display:inline-block;margin-bottom:6px;letter-spacing:0.3px;">${b.label}</span>`;

    return`<div data-salesscenario="${val}" onclick="selectResult(this)" style="padding:14px 16px;border-radius:var(--radius-sm);border:${sel?'1.5px solid var(--primary)':'1px solid var(--border)'};cursor:pointer;background:${sel?'var(--primary-light)':'var(--white)'};transition:all .15s;margin-bottom:8px;">

        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;">${title}</div>
          <div style="font-size:11px;color:var(--text-secondary);line-height:1.4;">${desc}</div>

        <span style="flex-shrink:0;color:var(--text-dim);margin-top:2px;opacity:${sel?1:0.4};">${icon('chevronRight',14)}</span>
      </div>

  function group(label,desc,cards){
    return`<div style="margin-bottom:24px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px;">${label}</div>

      t('grpNoCreditDesc'),

      card('existingLegacy',t('salesExistingLegacy'),t('salesExistingLegacyDesc'))
    )}
    <div style="height:1px;background:var(--border);margin-bottom:20px;"></div>
    ${group(
      es?'Solicitud de línea en curso':'Line application in progress',
      t('grpInFlightDesc'),

      card('inAnalysisVisit',t('salesInAnalysisVisit'),t('salesInAnalysisVisitDesc'))+
      card('pendingId',t('salesPendingId'),t('salesPendingIdDesc'))

    <div style="height:1px;background:var(--border);margin-bottom:20px;"></div>
    ${group(
      es?'Sin acceso a crédito':'No credit access',
      t('grpBlockedDesc'),
      card('rejected',t('salesRejected'),t('salesRejectedDesc'))+
      card('existingLegacyPastDue',t('salesExistingLegacyPastDue'),t('salesExistingLegacyPastDueDesc'))

  // Split into 4 name parts: first name, second name, first last name, second last name
  let n1='',n2='',a1='',a2='';
  if(nameParts.length===4){n1=nameParts[0];n2=nameParts[1];a1=nameParts[2];a2=nameParts[3];}
  else if(nameParts.length===3){n1=nameParts[0];n2='';a1=nameParts[1];a2=nameParts[2];}
  else if(nameParts.length===2){n1=nameParts[0];n2='';a1=nameParts[1];a2='';}
  else if(nameParts.length===1){n1=nameParts[0];} 
  else if(nameParts.length>4){n1=nameParts[0];n2=nameParts[1];a1=nameParts.slice(2,-1).join(' ');a2=nameParts[nameParts.length-1];}
  const docParts=(c.doc||'').split(/[:\s]+/).filter(Boolean);
  const docType=docParts[0]||'DUI';
  const docNum=docParts.slice(1).join(' ')||'';
  const dob=c.dob||state.pqData.dob||'1990-05-15';

  // Phone & email
  const email=c.email||state.pqData.email||'cliente@email.com';
  const phone=c.phone||state.pqData.phone||'+502 5890-1234';
  // Phone verification tiers:
  // - rating = existing with active line → biometría
  // - isNewCredit/maxCuota = pre-qualified (has offer, no active line) → OTP
  // - neither = new customer, no credit profile → free edit
  const phoneVerify=c.rating?'bio':(c.isNewCredit||c.maxCuota)?'otp':'none';
  const editingPhone=state._editingPhone;
  const verifSent=state._phoneBioSent;
  const verifDone=state._phoneBioVerified;

  // Delivery addresses
  if(!c.deliveryAddresses)c.deliveryAddresses=[
    {id:1,label:es?'Casa':'Home',dept:'San Salvador',muni:'San Salvador Centro',street:es?'Colonia Escalón, Calle La Reforma #245':'Escalon, La Reforma St #245',isDefault:true},
  ];
  const addrs=c.deliveryAddresses;
  const editingAddr=state._editingAddr;

  // Phone section
  let phoneSection='';
  if(editingPhone){
    if(phoneVerify==='bio'){
      // ── BIOMETRÍA (línea activa) ──
      if(verifDone){
        phoneSection=`
        <div class="form-group"><label class="form-label">${t('phone')}</label>
          <input class="form-input" value="${state._newPhone||phone}" readonly style="background:var(--surface-alt);color:var(--text);"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--success);background:var(--success-light);margin-bottom:16px;">
          <div style="text-align:center;">
            <div style="display:flex;justify-content:center;margin-bottom:8px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--success-light);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;">${icon('check',18,'#0D9B68')}</div></div>
            <div style="font-size:13px;font-weight:700;color:var(--success);margin-bottom:4px;">${es?'Teléfono actualizado':'Phone updated'}</div>
            <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">${es?'La verificación biométrica fue exitosa. El número de teléfono ha sido actualizado.':'Biometric verification was successful. The phone number has been updated.'}</div>
          </div>
        </div>`;
      } else if(verifSent){
        phoneSection=`
        <div class="form-group"><label class="form-label">${t('phone')} <span style="font-size:9px;color:var(--text-dim);">(${es?'nuevo':'new'})</span></label>
          <input class="form-input" value="${state._newPhone||''}" readonly style="background:var(--surface-alt);color:var(--text);"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--primary);background:var(--white);margin-bottom:16px;">
          <div style="text-align:center;">
            <div style="display:flex;justify-content:center;margin-bottom:8px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--primary-light);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;">${icon('smartphone',18,'#2B5CE6')}</div></div>
            <div style="font-size:13px;font-weight:700;margin-bottom:4px;">${es?'Verificación biométrica enviada':'Biometric verification sent'}</div>
            <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:4px;">${es?'Se ha enviado un enlace de verificación biométrica al número':'A biometric verification link has been sent to'} <strong style="font-family:var(--mono);">${state._newPhone||''}</strong></div>
            <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
              <button class="btn btn-secondary" id="btnSimPhoneBio" style="font-size:11px;padding:6px 16px;border-style:dashed;">${es?'Simular verificación exitosa':'Simulate successful verification'}</button>
              <button class="btn btn-secondary" id="btnCancelPhoneEdit" style="font-size:11px;padding:6px 16px;">${es?'Cancelar':'Cancel'}</button>
            </div>
          </div>
        </div>`;
      } else {
        phoneSection=`
        <div class="form-group"><label class="form-label">${es?'Nuevo número de teléfono':'New phone number'}</label>
          <input class="form-input" id="ucNewPhone" placeholder="+502 0000-0000" value="${state._newPhone||''}"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--warning);background:var(--warning-light);margin-bottom:16px;">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            <span style="flex-shrink:0;display:flex;color:var(--warning);margin-top:2px;">${icon('shield',16)}</span>
            <div style="flex:1;">
              <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;">${es?'Verificación biométrica requerida':'Biometric verification required'}</div>
              <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;">${es?'Este cliente tiene una línea de crédito activa. Se enviará un enlace de verificación biométrica al nuevo número. Si la verificación es exitosa, el cambio se aplicará automáticamente.':'This customer has an active credit line. A biometric verification link will be sent to the new number. If verification is successful, the change will be applied automatically.'}</div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-primary" id="btnSendPhoneBio" style="padding:7px 16px;font-size:11px;">${icon('smartphone',14)} ${es?'Enviar verificación':'Send verification'}</button>
                <button class="btn btn-secondary" id="btnCancelPhoneEdit" style="padding:7px 16px;font-size:11px;">${es?'Cancelar':'Cancel'}</button>
              </div>
            </div>
          </div>
        </div>`;
      }
    } else if(phoneVerify==='otp'){
      // ── OTP (pre-calificado) ──
      if(verifDone){
        phoneSection=`
        <div class="form-group"><label class="form-label">${t('phone')}</label>
          <input class="form-input" value="${state._newPhone||phone}" readonly style="background:var(--surface-alt);color:var(--text);"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--success);background:var(--success-light);margin-bottom:16px;">
          <div style="text-align:center;">
            <div style="display:flex;justify-content:center;margin-bottom:8px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--success-light);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;">${icon('check',18,'#0D9B68')}</div></div>
            <div style="font-size:13px;font-weight:700;color:var(--success);margin-bottom:4px;">${es?'Teléfono actualizado':'Phone updated'}</div>
            <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">${es?'El código OTP fue verificado exitosamente. El número de teléfono ha sido actualizado.':'OTP code was verified successfully. The phone number has been updated.'}</div>
          </div>
        </div>`;
      } else if(verifSent){
        phoneSection=`
        <div class="form-group"><label class="form-label">${t('phone')} <span style="font-size:9px;color:var(--text-dim);">(${es?'nuevo':'new'})</span></label>
          <input class="form-input" value="${state._newPhone||''}" readonly style="background:var(--surface-alt);color:var(--text);"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--primary);background:var(--white);margin-bottom:16px;">
          <div style="text-align:center;">
            <div style="display:flex;justify-content:center;margin-bottom:8px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--primary-light);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;">${icon('smartphone',18,'#2B5CE6')}</div></div>
            <div style="font-size:13px;font-weight:700;margin-bottom:4px;">${es?'Código OTP enviado':'OTP code sent'}</div>
            <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:4px;">${es?'Se ha enviado un código de verificación al número':'A verification code has been sent to'} <strong style="font-family:var(--mono);">${state._newPhone||''}</strong></div>
            <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
              <button class="btn btn-secondary" id="btnSimPhoneBio" style="font-size:11px;padding:6px 16px;border-style:dashed;">${es?'Simular verificación exitosa':'Simulate successful verification'}</button>
              <button class="btn btn-secondary" id="btnCancelPhoneEdit" style="font-size:11px;padding:6px 16px;">${es?'Cancelar':'Cancel'}</button>
            </div>
          </div>
        </div>`;
      } else {
        phoneSection=`
        <div class="form-group"><label class="form-label">${es?'Nuevo número de teléfono':'New phone number'}</label>
          <input class="form-input" id="ucNewPhone" placeholder="+502 0000-0000" value="${state._newPhone||''}"/></div>
        <div style="padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--primary);background:var(--primary-light);margin-bottom:16px;">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            <span style="flex-shrink:0;display:flex;color:var(--primary);margin-top:2px;">${icon('smartphone',16)}</span>
            <div style="flex:1;">
              <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;">${es?'Verificación OTP requerida':'OTP verification required'}</div>
              <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;">${es?'Este cliente está pre-calificado. Se enviará un código OTP al nuevo número para confirmar el cambio.':'This customer is pre-qualified. An OTP code will be sent to the new number to confirm the change.'}</div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-primary" id="btnSendPhoneBio" style="padding:7px 16px;font-size:11px;">${icon('smartphone',14)} ${es?'Enviar código OTP':'Send OTP code'}</button>
                <button class="btn btn-secondary" id="btnCancelPhoneEdit" style="padding:7px 16px;font-size:11px;">${es?'Cancelar':'Cancel'}</button>
              </div>
            </div>
          </div>
        </div>`;
      }
    } else {
      // ── SIN VALIDACIÓN (nuevo, sin perfil crediticio) ──
      phoneSection=`
        <div class="form-group"><label class="form-label">${t('phone')}</label>
          <input class="form-input" id="ucNewPhone" value="${state._newPhone||phone}"/></div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <button class="btn btn-primary" id="btnSavePhone" style="padding:7px 16px;font-size:12px;">${icon('check',14)} ${es?'Guardar teléfono':'Save phone'}</button>
          <button class="btn btn-secondary" id="btnCancelPhoneEdit" style="padding:7px 16px;font-size:12px;">${es?'Cancelar':'Cancel'}</button>
        </div>`;
    }
  } else {
    phoneSection=`
      <div class="form-group"><label class="form-label">${t('phone')}</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="form-input" value="${phone}" readonly style="background:var(--surface-alt);color:var(--text);flex:1;"/>
          <button class="btn btn-secondary" id="btnStartPhoneEdit" style="padding:7px 14px;font-size:11px;flex-shrink:0;">${icon('user',12)} ${es?'Cambiar':'Change'}</button>
        </div>
      </div>`;
  }

  // Address editing form
  let addrEditForm='';
  if(editingAddr!==undefined&&editingAddr!==null){
    const isNew=editingAddr==='new';
    const addr=isNew?{dept:'',muni:'',street:'',label:''}:addrs.find(a=>a.id===editingAddr)||{};
    addrEditForm=`
    <div style="padding:16px;border:1.5px solid var(--primary);border-radius:var(--radius-sm);background:var(--primary-light);margin-bottom:12px;animation:fadeUp .3s;">
      <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:12px;">${isNew?(es?'Nueva dirección de entrega':'New delivery address'):(es?'Editar dirección':'Edit address')}</div>
      <div class="form-group"><label class="form-label">${es?'Etiqueta':'Label'}</label><input class="form-input" id="addrLabel" placeholder="${es?'Ej: Casa, Oficina, Mamá...':'E.g: Home, Office, Mom...'}" value="${addr.label||''}"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">${t('dept')}</label><select class="form-select" id="addrDept"><option value="">...</option><option ${addr.dept==='San Salvador'?'selected':''}>San Salvador</option><option ${addr.dept==='La Libertad'?'selected':''}>La Libertad</option><option ${addr.dept==='Santa Ana'?'selected':''}>Santa Ana</option></select></div>
        <div class="form-group"><label class="form-label">${t('muni')}</label><select class="form-select" id="addrMuni"><option value="">...</option><option ${addr.muni==='San Salvador Centro'?'selected':''}>San Salvador Centro</option><option ${addr.muni==='Mejicanos'?'selected':''}>Mejicanos</option><option ${addr.muni==='Santa Tecla'?'selected':''}>Santa Tecla</option><option ${addr.muni==='Soyapango'?'selected':''}>Soyapango</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">${es?'Dirección':'Address'}</label><textarea class="form-input" id="addrStreet" rows="2" style="resize:none;">${addr.street||''}</textarea></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btnSaveAddr" style="padding:8px 18px;font-size:12px;">${icon('check',14)} ${es?'Guardar':'Save'}</button>
        <button class="btn btn-secondary" id="btnCancelAddr" style="padding:8px 18px;font-size:12px;">${es?'Cancelar':'Cancel'}</button>
      </div>
    </div>`;
  }

  const initials=(c.name||'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('');

  return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
    <div style="padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;">
      <span id="btnUpdateClientBack" style="cursor:pointer;display:flex;color:var(--text-dim);transform:rotate(180deg);">${icon('chevronRight',20)}</span>
      <div style="font-size:16px;font-weight:800;">${es?'Actualizar Datos del Cliente':'Update Customer Info'}</div>
    </div>
    <div style="flex:1;padding:20px 16px;overflow-y:auto;">
      <div style="max-width:640px;margin:0 auto;">

        <!-- Client identity card -->
        <div style="display:flex;align-items:center;gap:14px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;">
          <div style="width:50px;height:50px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;">${initials}</div>
          <div style="flex:1;">
            <div style="font-size:16px;font-weight:800;color:var(--text);">${c.name}</div>
            <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${c.doc}</div>
            ${creditBadge(c)}
          </div>
        </div>

        <!-- Non-editable data -->
        <div class="card" style="padding:20px;margin-bottom:16px;">
          <div class="section-label">${es?'Datos de Identidad':'Identity Data'}</div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">${t('idType')}</label><input class="form-input" value="${docType}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
            <div class="form-group"><label class="form-label">${t('idNum')}</label><input class="form-input" value="${docNum}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">${es?'Primer Nombre':'First Name'}</label><input class="form-input" value="${n1}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
            <div class="form-group"><label class="form-label">${es?'Segundo Nombre':'Second Name'}</label><input class="form-input" value="${n2}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">${es?'Primer Apellido':'First Last Name'}</label><input class="form-input" value="${a1}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
            <div class="form-group"><label class="form-label">${es?'Segundo Apellido':'Second Last Name'}</label><input class="form-input" value="${a2}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
          </div>
          <div class="form-group" style="margin-bottom:0;"><label class="form-label">${t('dob')}</label><input class="form-input" value="${dob}" readonly style="background:var(--surface-alt);color:var(--text-dim);"/></div>
        </div>

        <!-- Editable: Contact -->
        <div class="card" style="padding:20px;margin-bottom:16px;">
          <div class="section-label">${es?'Contacto':'Contact'}</div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="ucEmail" value="${email}"/>
          </div>
          ${phoneSection}
        </div>

        <!-- Delivery addresses -->
        <div class="card" style="padding:20px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div class="section-label" style="margin-bottom:0;">${es?'Direcciones de Entrega':'Delivery Addresses'}</div>
            ${editingAddr===undefined||editingAddr===null?`<button class="btn btn-secondary" id="btnAddAddr" style="padding:5px 14px;font-size:11px;">${icon('plus',12)} ${es?'Agregar':'Add'}</button>`:''}
          </div>
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px;line-height:1.4;">${es?'Direcciones para envío de productos. Son independientes de la dirección de domicilio o trabajo del perfil crediticio.':'Product delivery addresses. Independent from home or work addresses in the credit profile.'}</div>

          ${addrEditForm}

          ${addrs.map(a=>`
            <div style="padding:14px;border:1px solid ${a.isDefault?'var(--primary)':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:8px;background:var(--white);${a.isDefault?'border-left:3px solid var(--primary);':''}">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                    <span style="font-size:13px;font-weight:700;color:var(--text);">${a.label||'—'}</span>
                    ${a.isDefault?`<span style="padding:1px 8px;border-radius:10px;background:var(--primary-light);font-size:9px;font-weight:700;color:var(--primary);">${es?'PREDETERMINADA':'DEFAULT'}</span>`:''}
                  </div>
                  <div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">${a.street||''}</div>
                  <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${a.muni||''}, ${a.dept||''}</div>
                  ${!a.isDefault?`<div style="margin-top:8px;"><span data-setdefault="${a.id}" style="font-size:11px;font-weight:600;color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px;">${icon('check',12,'#2B5CE6')} ${es?'Hacer predeterminada':'Set as default'}</span></div>`:''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  <span data-editaddr="${a.id}" style="cursor:pointer;display:flex;color:var(--primary);padding:4px;">${icon('clipboardList',14)}</span>
                  ${!a.isDefault?`<span data-deladdr="${a.id}" style="cursor:pointer;display:flex;color:var(--danger);padding:4px;">${icon('x',14)}</span>`:''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        <button class="btn btn-primary" id="btnSaveClientData" style="width:100%;justify-content:center;padding:14px;font-size:14px;margin-bottom:20px;">${icon('check',16)} ${es?'Guardar Cambios':'Save Changes'}</button>
      </div>
    </div>
  </div>`;
}

function creditBadge(c){
  const es=state.lang==='es';
  if(!c)return'';
  if(c.isLegacyPastDue){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:var(--orange-light);border:1px solid #F5C9A8;font-size:10px;font-weight:700;color:var(--orange);">${icon('alertTriangle',10,'#E07428')} ${es?'Activo sin Línea · En mora':'Active · No Line · Past Due'}</div>`;
  }
  if(c.isLegacy){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:#F3E8FF;border:1px solid #DDD6FE;font-size:10px;font-weight:700;color:#7C3AED;">${icon('building',10,'#7C3AED')} ${es?'Activo sin Línea':'Active · No Line'}</div>`;
  }
  if(c.rating&&c.pastDue){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:var(--orange-light);border:1px solid #F5C9A8;font-size:10px;font-weight:700;color:var(--orange);">${icon('alertTriangle',10,'#E07428')} ${es?'Línea activa — En mora':'Active line — Past due'}</div>`;
  }
  if(c.rating){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:var(--success-light);border:1px solid var(--success-border);font-size:10px;font-weight:700;color:var(--success);">${icon('shield',10,'#0D9B68')} ${es?'Línea activa':'Active line'}</div>`;
  }
  if(c.isNewCredit||c.maxCuota){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:var(--primary-light);border:1px solid #C5D0F0;font-size:10px;font-weight:700;color:var(--primary);">${icon('checkCircle',10,'#2B5CE6')} ${es?'Pre-calificado':'Pre-qualified'}</div>`;
  }
  if(c.creditRejected){
    return`<div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;background:var(--danger-light);border:1px solid #F5B4BA;font-size:10px;font-weight:700;color:var(--danger);">${icon('x',10,'#D63B4A')} ${es?'Sin crédito':'No credit'}</div>`;
  }

              <div style="font-family:var(--mono);font-size:26px;font-weight:800;color:var(--primary);">Q${currentAvail.toFixed(2)}<span style="font-size:12px;font-weight:400;color:var(--text-dim);"> /${es?'mes':'mo'}</span></div>

                ${[{l:es?'Merc.':'HP',v:currentLimitMerc},{l:'Moto',v:currentLimitMoto},{l:'Cash',v:currentLimitCash}].map(x=>`
                <div style="padding:6px 8px;border-radius:6px;background:white;border:1px solid #C5D0F0;text-align:center;">
                  <div style="font-size:9px;color:var(--text-dim);font-weight:700;text-transform:uppercase;">${x.l}</div>
                  <div style="font-family:var(--mono);font-size:12px;font-weight:700;">Q${x.v.toLocaleString('en')}</div>
                </div>`).join('')}
              </div>
            </div>

            <!-- Income 1 -->
            <div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden;">
              <div style="padding:10px 14px;background:var(--surface-alt);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
                <span style="font-size:12px;font-weight:700;">${es?'Ingreso principal':'Primary income'}</span>
                ${inc1ok?`<span style="font-size:10px;font-weight:700;color:var(--success);display:flex;align-items:center;gap:3px;">${icon('check',12,'var(--success)')} ${es?'Completo':'Complete'}</span>`:''}
              </div>
              <div style="padding:14px;">
                ${buildIncomeBlock('li_',{p1:li.p1||'',p2:li.p2||'',p3:li.p3||'',p4:li.p4||'',income:li.income||'',activity:li.activity||'',industry:li.industry||'',empName:li.empName||'',depSource:li.depSource||''},'')}

                <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);">
                  <div style="font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:4px;">${icon('paperclip',11,'#8D93A5')} ${es?'Comprobante de ingreso 1':'Income proof 1'} <span style="color:var(--danger);">*</span></div>

                    <span style="color:var(--success);display:flex;align-items:center;gap:6px;">${icon('check',10,'var(--success)')} ${f}</span>

                  ${docs1.length<2?`<div class="upload-area" id="liUploadDoc1" style="padding:8px;margin-top:4px;"><div class="upload-text" style="font-size:11px;">${docs1.length===0?(es?'📎 Adjuntar comprobante':'📎 Attach proof'):(es?'+ Agregar otro':'+ Add another')}</div></div>`:''}
                  ${!inc1ok&&inc1>0&&docs1.length===0?`<div style="font-size:10px;color:var(--danger);font-weight:600;margin-top:4px;">${es?'Requerido para continuar':'Required to continue'}</div>`:''}
                </div>
              </div>
            </div>

            <!-- Add second income -->
            ${!li.showSecondIncome
              ?`<button class="btn btn-secondary" id="liAddIncome2" style="width:100%;justify-content:center;border-style:dashed;margin-bottom:12px;">${icon('plus',14)} ${es?'Agregar segundo ingreso':'Add second income'}</button>`

                <div style="padding:10px 14px;background:var(--surface-alt);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">

                  <div style="display:flex;align-items:center;gap:8px;">
                    ${inc2ok&&li.showSecondIncome?`<span style="font-size:10px;font-weight:700;color:var(--success);display:flex;align-items:center;gap:3px;">${icon('check',12,'var(--success)')} ${es?'Completo':'Complete'}</span>`:''}
                    <button class="btn btn-secondary" id="liRemoveIncome2" style="padding:2px 8px;font-size:10px;">${es?'Quitar':'Remove'}</button>
                  </div>
                </div>
