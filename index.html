                  ${buildIncomeBlock('li2_',{p1:li.p1_2||'',p2:li.p2_2||'',p3:li.p3_2||'',p4:li.p4_2||'',income:li.income2||'',activity:li.activity2||'',industry:li.industry2||'',empName:li.empName2||'',depSource:li.depSource2||''},'')}
                  <!-- Doc for income 2 -->
                  <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);">
                    <div style="font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:4px;">${icon('paperclip',11,'#8D93A5')} ${es?'Comprobante de ingreso 2':'Income proof 2'} <span style="color:var(--danger);">*</span></div>
                    ${docs2.map((f,i)=>`<div class="upload-file" style="justify-content:space-between;margin-bottom:4px;">
                      <span style="color:var(--success);display:flex;align-items:center;gap:6px;">${icon('check',10,'var(--success)')} ${f}</span>
                      <span style="cursor:pointer;color:var(--text-dim);font-size:11px;" data-li-rmdoc2="${i}">✕</span>
                    </div>`).join('')}
                    ${docs2.length<2?`<div class="upload-area" id="liUploadDoc2" style="padding:8px;margin-top:4px;"><div class="upload-text" style="font-size:11px;">${docs2.length===0?(es?'📎 Adjuntar comprobante':'📎 Attach proof'):(es?'+ Agregar otro':'+ Add another')}</div></div>`:''}
                    ${!inc2ok&&inc2>0&&docs2.length===0?`<div style="font-size:10px;color:var(--danger);font-weight:600;margin-top:4px;">${es?'Requerido para continuar':'Required to continue'}</div>`:''}
                  </div>
                </div>
              </div>`
            }

          </div>
        </div>
        <!-- Sticky CTA -->
        <div style="position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);padding:14px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.08);">
          <div class="inner-container">
            ${!canSubmit?`<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;text-align:center;">${es?'Completá ingresos y adjuntá comprobantes para continuar':'Complete income fields and attach proofs to continue'}</div>`:''}
            <div style="display:flex;gap:10px;">
              <button class="btn btn-secondary" id="btnLimitIncBack2" style="flex-shrink:0;">${es?'Cancelar':'Cancel'}</button>
              <button class="btn btn-primary" id="btnLimitIncSubmit" style="flex:1;justify-content:center;" ${canSubmit?'':'disabled'}>${es?'Continuar':'Continue'}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── STEP 1: Selector de resultado (prototipo) ───────────────────
    if(step===1){
      const selResult=state._liSelectedResult||null;
      const opts=[
        {id:'express',  icon:'checkCircle', color:'var(--success)', bg:'var(--success-light)', border:'var(--success-border)',
          label:es?'Aprobado Express':'Express Approval',
          desc:es?'Cumple criterios: antigüedad ≥6 meses, pagos al día, incremento ≤30%. Activación inmediata.':'Meets criteria: tenure ≥6mo, current on payments, increase ≤30%. Immediate activation.'},
        {id:'analysis', icon:'clock',       color:'var(--warning)', bg:'var(--warning-light)', border:'var(--warning-border)',
          label:es?'Análisis — sin visita':'Analysis — no visit',
          desc:es?'Incremento entre 30% y 60%. Requiere revisión por analista. Tiempo estimado: 24–48h hábiles.':'Increase 30–60%. Requires analyst review. Estimated time: 24–48 business hours.'},
        {id:'analysis_visit', icon:'mapPin', color:'var(--primary)', bg:'var(--primary-light)', border:'#C5D0F0',
          label:es?'Análisis + visita física':'Analysis + physical visit',
          desc:es?'Incremento >60% o línea <6 meses. Requiere análisis y verificación física en domicilio o trabajo.':'Increase >60% or line <6mo. Requires analysis and physical verification at home or work.'},
        {id:'rejected', icon:'x',           color:'var(--danger)', bg:'#FEF0F0',              border:'#F5B4BA',
          label:es?'Rechazado':'Rejected',
          desc:es?'No cumple criterios: mora activa, ingresos insuficientes o perfil de riesgo no aprobado.':'Does not meet criteria: active past due, insufficient income, or unapproved risk profile.'},
      ];

      return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
        ${liHeader(es?'Resultado de Evaluación':'Evaluation Result')}
        <div style="flex:1;padding:16px;overflow-y:auto;padding-bottom:100px;">
          <div class="inner-container">

            <!-- Prototype banner -->
            <div style="padding:10px 14px;border-radius:var(--radius-sm);background:#FFF8E1;border:1px solid #FFD54F;margin-bottom:18px;display:flex;align-items:flex-start;gap:8px;">
              <span style="font-size:14px;flex-shrink:0;">🧪</span>
              <div style="font-size:11px;color:#8B6914;line-height:1.5;">${es?'<strong>Solo prototipo.</strong> En el producto real el motor de decisión determina el resultado automáticamente. Seleccioná el resultado a demostrar:':'<strong>Prototype only.</strong> In the real product the decision engine determines the result automatically. Select the result to demonstrate:'}</div>
            </div>

            <!-- Options -->
            ${opts.map(o=>{
              const isSel=selResult===o.id;
              return`<div data-li-result="${o.id}" style="display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--radius-sm);border:${isSel?`2px solid ${o.color}`:`1.5px solid var(--border)`};background:${isSel?o.bg:'var(--white)'};cursor:pointer;transition:all .15s;margin-bottom:10px;">
                <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${isSel?o.color:'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:white;">${isSel?`<div style="width:12px;height:12px;border-radius:50%;background:${o.color};"></div>`:''}</div>
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
                    <span style="display:flex;color:${o.color};">${icon(o.icon,14,o.color)}</span>
                    <span style="font-size:13px;font-weight:700;color:var(--text);">${o.label}</span>
                  </div>
                  <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">${o.desc}</div>
                </div>
              </div>`;
            }).join('')}

          </div>
        </div>
        <div style="position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);padding:14px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.08);">
          <div class="inner-container">
            <div style="display:flex;gap:10px;">
              <button class="btn btn-secondary" id="btnLimitIncBack" style="flex-shrink:0;">${es?'Volver':'Back'}</button>
              <button class="btn btn-primary" id="btnLimitIncNext" style="flex:1;justify-content:center;" ${!selResult?'disabled':''}>${selResult==='analysis_visit'?(es?'Agendar visita':'Schedule visit'):selResult==='express'?(es?'Ver resultado':'See result'):(es?'Continuar':'Continue')}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── STEP 2: Agendamiento de visita (solo analysis_visit) ────────
    if(step===2){
      const visitDates=[];const now2=new Date();let tries=0;
      while(visitDates.length<5&&tries<14){
        tries++;const d=new Date(now2);d.setDate(d.getDate()+tries);
        if(d.getDay()===0||d.getDay()===6)continue;
        const dl=d.toLocaleDateString(es?'es-SV':'en-US',{weekday:'short',day:'numeric',month:'short'});
        visitDates.push({iso:d.toISOString().split('T')[0],num:d.getDate(),label:dl.split(' ').slice(0,2).join(', ')});
      }
      const c=customer;
      const homeAddr=c.deliveryAddresses&&c.deliveryAddresses.length>0?(c.deliveryAddresses.find(a=>a.isDefault)||c.deliveryAddresses[0]):null;
      const homeAddrStr=homeAddr?(homeAddr.street+', '+homeAddr.muni+', '+homeAddr.dept):(state.pqData&&state.pqData.street?state.pqData.street+', '+(state.pqData.canton?state.pqData.canton+', ':'')+state.pqData.muni:'—');
      const workAddrStr=state.pqData&&state.pqData.workStreet?state.pqData.workStreet+', '+(state.pqData.workMuni||''):(es?'Dirección laboral no registrada':'Work address not on file');
      const hasWork=!!(state.pqData&&state.pqData.workStreet);
      const selAddr=state._liVisitAddr||'home';
      const selDate=state._liVisitDate||null;
      const selTime=state._liVisitTime||null;
      const canConfirm=selDate&&selTime;

      return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
        ${liHeader(es?'Agendar Visita':'Schedule Visit',es?'Verificación física requerida':'Physical verification required')}
        <div style="flex:1;padding:16px;overflow-y:auto;padding-bottom:110px;">
          <div class="inner-container">

            <div style="padding:12px 14px;border-radius:var(--radius-sm);background:var(--primary-light);border:1px solid #C5D0F0;margin-bottom:20px;display:flex;align-items:flex-start;gap:10px;">
              <span style="flex-shrink:0;color:var(--primary);display:flex;margin-top:1px;">${icon('mapPin',14,'var(--primary)')}</span>
              <div style="font-size:11px;color:var(--text-secondary);line-height:1.4;">${es?'El analista visitará al cliente para verificar la información antes de aprobar el incremento.':'The analyst will visit the customer to verify information before approving the increase.'}</div>
            </div>

            <div class="section-label">${es?'Dirección de la visita':'Visit address'}</div>
            <div style="margin-bottom:20px;">
              <div data-li-visitaddr="home" style="padding:14px;border:1.5px solid ${selAddr==='home'?'var(--primary)':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:8px;background:${selAddr==='home'?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .2s;">
                <div style="display:flex;align-items:flex-start;gap:10px;">
                  <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${selAddr==='home'?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${selAddr==='home'?'<div style="width:10px;height:10px;border-radius:50%;background:var(--primary);"></div>':''}</div>
                  <div><div style="font-size:13px;font-weight:700;">${es?'Domicilio':'Home'}</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4;">${homeAddrStr}</div></div>
                </div>
              </div>
              <div data-li-visitaddr="work" style="padding:14px;border:1.5px solid ${selAddr==='work'?'var(--primary)':'var(--border)'};border-radius:var(--radius-sm);background:${selAddr==='work'?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .2s;${!hasWork?'opacity:.45;pointer-events:none;':''}">
                <div style="display:flex;align-items:flex-start;gap:10px;">
                  <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${selAddr==='work'?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${selAddr==='work'?'<div style="width:10px;height:10px;border-radius:50%;background:var(--primary);"></div>':''}</div>
                  <div><div style="font-size:13px;font-weight:700;">${es?'Lugar de trabajo':'Workplace'}</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4;">${workAddrStr}</div></div>
                </div>
              </div>
            </div>

            <div class="section-label">${es?'Fecha de la visita':'Visit date'}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;">
              ${visitDates.map(d=>`<div data-li-visitdate="${d.iso}" style="padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid ${selDate===d.iso?'var(--primary)':'var(--border)'};background:${selDate===d.iso?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;min-width:72px;">
                <div style="font-size:13px;font-weight:700;">${d.num}</div>
                <div style="font-size:9px;color:var(--text-dim);text-transform:capitalize;margin-top:2px;">${d.label}</div>
              </div>`).join('')}
            </div>

            <div class="section-label">${es?'Franja horaria':'Time window'}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              ${[{id:'am',icon:'sunrise',label:es?'Mañana':'Morning',sub:'8:00–12:00'},{id:'mid',icon:'sun',label:es?'Medio día':'Midday',sub:'12:00–14:00'},{id:'pm',icon:'sunset',label:es?'Tarde':'Afternoon',sub:'14:00–17:00'}].map(tw=>`
              <div data-li-visittime="${tw.id}" style="padding:12px 8px;border-radius:var(--radius-sm);border:1.5px solid ${selTime===tw.id?'var(--primary)':'var(--border)'};background:${selTime===tw.id?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;">
                <div style="margin-bottom:4px;color:var(--warning);display:flex;justify-content:center;">${icon(tw.icon,18)}</div>
                <div style="font-size:11px;font-weight:700;">${tw.label}</div>
                <div style="font-size:9px;color:var(--text-dim);margin-top:1px;">${tw.sub}</div>
              </div>`).join('')}
            </div>

          </div>
        </div>
        <div style="position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);padding:14px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.08);">
          <div class="inner-container">
            ${canConfirm?`<div style="padding:9px 13px;border-radius:var(--radius-sm);background:var(--primary-light);border:1px solid #C5D0F0;margin-bottom:10px;font-size:12px;color:var(--primary);line-height:1.5;">
              📅 <strong>${new Date(selDate+'T12:00:00').toLocaleDateString(es?'es-SV':'en-US',{weekday:'long',day:'numeric',month:'long'})}</strong>
              · ${selTime==='am'?(es?'Mañana 8–12':'Morning 8–12'):selTime==='mid'?(es?'Mediodía 12–14':'Midday 12–14'):(es?'Tarde 14–17':'Afternoon 14–17')}
              · ${selAddr==='work'?(es?'Trabajo':'Work'):(es?'Domicilio':'Home')}
            </div>`:''}
            <div style="display:flex;gap:10px;">
              <button class="btn btn-secondary" id="btnLimitIncBack" style="flex-shrink:0;">${es?'Volver':'Back'}</button>
              <button class="btn btn-primary" id="btnLimitIncNext" style="flex:1;justify-content:center;" ${!canConfirm?'disabled':''}>${es?'Ver resultado':'See result'}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── STEP 3: Resultado final ─────────────────────────────────────
  }


  if(sub==='checkout'){
    return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
      <div style="padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
        <span id="btnCheckoutBack" style="cursor:pointer;display:flex;color:var(--text-dim);transform:rotate(180deg);">${icon('chevronRight',22)}</span>
        <div style="font-size:16px;font-weight:800;">${state.lang==='es'?'Método de Entrega':'Delivery Method'}</div>
      </div>
      <div style="flex:1;padding:16px;overflow-y:auto;">
        <div class="inner-container">
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:20px;">${state.lang==='es'?'Seleccione cómo desea recibir los productos.':'Select how you would like to receive the products.'}</div>

          <!-- Home delivery -->
          <div style="display:flex;align-items:flex-start;gap:12px;padding:20px;border-radius:var(--radius-sm);border:1.5px solid ${state.salesShipMethod==='home'?'var(--primary)':'var(--border)'};background:${state.salesShipMethod==='home'?'var(--primary-light)':'var(--white)'};cursor:pointer;margin-bottom:12px;transition:all .2s;" data-shipmethod="home">
            <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${state.salesShipMethod==='home'?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">${state.salesShipMethod==='home'?'<div style="width:12px;height:12px;border-radius:50%;background:var(--primary);"></div>':''}</div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:700;">${t('salesShipHome')}</div>
              <div style="font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:2px;">${t('salesShipHomeDesc')}</div>
              <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--primary);margin-top:6px;">${t('salesShipCost')}</div>
            </div>
          </div>

          <!-- Store pickup -->
          <div style="display:flex;align-items:flex-start;gap:12px;padding:20px;border-radius:var(--radius-sm);border:1.5px solid ${state.salesShipMethod==='store'?'var(--primary)':'var(--border)'};background:${state.salesShipMethod==='store'?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .2s;" data-shipmethod="store">
            <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${state.salesShipMethod==='store'?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">${state.salesShipMethod==='store'?'<div style="width:12px;height:12px;border-radius:50%;background:var(--primary);"></div>':''}</div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:700;">${t('salesShipStore')}</div>
              <div style="font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:2px;">${t('salesShipStoreDesc')}</div>
              <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--success);margin-top:6px;">${t('salesShipFree')}</div>
            </div>
          </div>

          <div style="margin-top:24px;">
            <button class="btn btn-primary" id="btnCheckoutContinue" style="width:100%;justify-content:center;padding:14px;font-size:14px;" ${!state.salesShipMethod?'disabled':''}>${t('btnNext')}</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ─── SUB: Shipping Method ───
  if(sub==='shipping'){
    const c=customer;
    const es=state.lang==='es';
    const shipDates=[];const now=new Date();
    for(let i=1;i<=5;i++){const d=new Date(now);d.setDate(d.getDate()+i);const dl=d.toLocaleDateString(es?'es-SV':'en-US',{weekday:'short',month:'short',day:'numeric'});shipDates.push({iso:d.toISOString().split('T')[0],num:d.getDate(),label:dl.split(' ').slice(0,2).join(' ')});}

    // Ensure delivery addresses exist
    if(!c.deliveryAddresses)c.deliveryAddresses=[{id:1,label:es?'Casa':'Home',dept:'San Salvador',muni:'San Salvador Centro',street:es?'Colonia Escalón, Calle La Reforma #245':'Escalon, La Reforma St #245',isDefault:true}];
    const addrs=c.deliveryAddresses;
    const selectedAddr=state._shipAddrId||((addrs.find(a=>a.isDefault)||addrs[0]||{}).id);
    const email=c.email||state.pqData.email||'cliente@email.com';
    const phone=c.phone||state.pqData.phone||'+502 5890-1234';
    const initials=(c.name||'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('');

    return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
      <div style="padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
        <span id="btnShippingBack" style="cursor:pointer;display:flex;color:var(--text-dim);transform:rotate(180deg);">${icon('chevronRight',22)}</span>
        <div style="font-size:16px;font-weight:800;">${t('salesCheckoutTitle')}</div>
      </div>
      <div style="flex:1;padding:16px;overflow-y:auto;">
        <div class="inner-container">

          <div style="padding:10px 14px;border-radius:var(--radius-sm);background:var(--primary-light);border:1px solid #C5D0F0;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
            <span style="display:flex;color:var(--primary);">${icon('home',16)}</span>
            <div style="font-size:12px;font-weight:600;color:var(--primary);">${t('salesShipHome')} — ${t('salesShipCost')}</div>
          </div>

          <!-- Client identity card -->
          <div style="display:flex;align-items:center;gap:14px;padding:18px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;">
            <div style="width:46px;height:46px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;">${initials}</div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:800;color:var(--text);">${c.name}</div>
              <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${c.doc}</div>
              ${creditBadge(c)}
            </div>
          </div>

          <!-- Contact for delivery -->
          <div class="section-label">${es?'Contacto para la Entrega':'Delivery Contact'}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;">${es?'Datos de contacto para coordinar la entrega. Puede ser diferente al teléfono registrado del cliente.':'Contact info to coordinate delivery. Can differ from the customer\'s registered phone.'}</div>

            <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="shipEmail" value="${email}"/></div>
            <div class="form-group"><label class="form-label">${es?'Teléfono':'Phone'}</label><input class="form-input" id="shipPhone" value="${phone}"/></div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;">
            <div class="section-label" style="margin-bottom:0;">${es?'Dirección de Entrega':'Delivery Address'}</div>
            <span id="btnShipAddAddr" style="font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px;">${icon('plus',12,'#2B5CE6')} ${es?'Nueva':'New'}</span>
          </div>
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;margin-top:4px;">${es?'Seleccione o agregue una dirección de entrega.':'Select or add a delivery address.'}</div>

          <div style="padding:16px;border:1.5px solid var(--primary);border-radius:var(--radius-sm);background:var(--primary-light);margin-bottom:12px;">
            <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:12px;">${state._shipEditAddr==='new'?(es?'Nueva dirección de entrega':'New delivery address'):(es?'Editar dirección':'Edit address')}</div>
            <div class="form-group"><label class="form-label">${es?'Etiqueta':'Label'}</label><input class="form-input" id="shipAddrLabel" placeholder="${es?'Ej: Casa, Oficina...':'E.g: Home, Office...'}" value="${state._shipEditAddr==='new'?'':(addrs.find(a=>a.id===state._shipEditAddr)||{}).label||''}"/></div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">${t('dept')}</label><select class="form-select" id="shipAddrDept"><option value="">...</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).dept==='San Salvador')?'selected':''}>San Salvador</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).dept==='La Libertad')?'selected':''}>La Libertad</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).dept==='Santa Ana')?'selected':''}>Santa Ana</option></select></div>
              <div class="form-group"><label class="form-label">${t('muni')}</label><select class="form-select" id="shipAddrMuni"><option value="">...</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).muni==='San Salvador Centro')?'selected':''}>San Salvador Centro</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).muni==='Mejicanos')?'selected':''}>Mejicanos</option><option ${(state._shipEditAddr!=='new'&&(addrs.find(a=>a.id===state._shipEditAddr)||{}).muni==='Santa Tecla')?'selected':''}>Santa Tecla</option></select></div>
            </div>
            <div class="form-group"><label class="form-label">${es?'Dirección':'Address'}</label><textarea class="form-input" id="shipAddrStreet" rows="2" style="resize:none;">${state._shipEditAddr==='new'?'':(addrs.find(a=>a.id===state._shipEditAddr)||{}).street||''}</textarea></div>

              <button class="btn btn-primary" id="btnShipSaveAddr" style="padding:8px 18px;font-size:12px;">${icon('check',14)} ${es?'Guardar':'Save'}</button>
              <button class="btn btn-secondary" id="btnShipCancelAddr" style="padding:8px 18px;font-size:12px;">${es?'Cancelar':'Cancel'}</button>
            </div>
          </div>
          `:''}

          ${addrs.map(a=>`
            <div data-shipaddr="${a.id}" style="padding:14px;border:1.5px solid ${selectedAddr===a.id?'var(--primary)':a.isDefault?'var(--primary)':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:8px;background:${selectedAddr===a.id?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .2s;">
              <div style="display:flex;align-items:flex-start;gap:10px;">
                <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${selectedAddr===a.id?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">${selectedAddr===a.id?'<div style="width:10px;height:10px;border-radius:50%;background:var(--primary);"></div>':''}</div>

                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">

                  <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${a.muni||''}, ${a.dept||''}</div>

                  <span data-shipeditaddr="${a.id}" style="cursor:pointer;display:flex;color:var(--primary);padding:4px;">${icon('clipboardList',14)}</span>
                  ${!a.isDefault?`<span data-shipdeladdr="${a.id}" style="cursor:pointer;display:flex;color:var(--danger);padding:4px;">${icon('x',14)}</span>`:''}
                </div>
              </div>
            </div>
          `).join('')}

          <!-- Date selection -->
          <div class="section-label" style="margin-top:24px;">${t('salesShipDate')}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${shipDates.map(d=>`<div data-shipdate="${d.iso}" style="padding:8px 12px;border-radius:var(--radius-sm);border:1.5px solid ${state.salesShipDate===d.iso?'var(--primary)':'var(--border)'};background:${state.salesShipDate===d.iso?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;min-width:70px;">
              <div style="font-size:12px;font-weight:700;">${d.num}</div>
              <div style="font-size:9px;color:var(--text-dim);text-transform:capitalize;">${d.label}</div>
            </div>`).join('')}
          </div>

          <!-- Time selection -->
          <div class="section-label" style="margin-top:20px;">${t('salesShipTime')}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div style="padding:10px;border-radius:var(--radius-sm);border:1.5px solid ${state._salesShipTime==='am'?'var(--primary)':'var(--border)'};background:${state._salesShipTime==='am'?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;" data-shiptime="am">
              <div style="margin-bottom:2px;color:var(--warning);display:flex;justify-content:center;">${icon('sunrise',18)}</div>
              <div style="font-size:11px;font-weight:700;">${es?'Mañana':'Morning'}</div>
              <div style="font-size:9px;color:var(--text-dim);">8:00 - 11:59</div>
            </div>
            <div style="padding:10px;border-radius:var(--radius-sm);border:1.5px solid ${state._salesShipTime==='mid'?'var(--primary)':'var(--border)'};background:${state._salesShipTime==='mid'?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;" data-shiptime="mid">
              <div style="margin-bottom:2px;color:var(--warning);display:flex;justify-content:center;">${icon('sun',18)}</div>
              <div style="font-size:11px;font-weight:700;">${es?'Medio día':'Midday'}</div>
              <div style="font-size:9px;color:var(--text-dim);">12:00 - 2:59</div>
            </div>
            <div style="padding:10px;border-radius:var(--radius-sm);border:1.5px solid ${state._salesShipTime==='pm'?'var(--primary)':'var(--border)'};background:${state._salesShipTime==='pm'?'var(--primary-light)':'var(--white)'};cursor:pointer;text-align:center;transition:all .2s;" data-shiptime="pm">
              <div style="margin-bottom:2px;color:var(--warning);display:flex;justify-content:center;">${icon('sunset',18)}</div>
              <div style="font-size:11px;font-weight:700;">${es?'Tarde':'Afternoon'}</div>
              <div style="font-size:9px;color:var(--text-dim);">3:00 - 5:59</div>
            </div>
          </div>

          <div style="margin-top:28px;">
            <button class="btn btn-primary" id="btnShippingContinue" style="width:100%;justify-content:center;padding:14px;font-size:14px;">${t('salesShipContinue')}</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ─── SUB: Payment Method ───
  if(sub==='payment'){
    const es=state.lang==='es';
    const shipCost=state.salesShipMethod==='home'?39:0;
    const grandTotal=total+shipCost;
    const hasCredit=(customer.isNewCredit||customer.isLegacy||state.salesScenario==='existing')&&!customer.creditRejected&&!customer.pastDue&&!customer.isLegacyPastDue;
    const mercLimit=customer.limitMerc||(state.outcome===2?vpLimit(936-378.30, 25, 48):vpLimit(663,25,48));
    const isCreditSel=state.salesPayMethod==='credit';
    const isContadoSel=state.salesPayMethod==='contado';

    // Per-item credit prices from catalog promoRate
    const catalog=getCatalog();
    const itemsWithPricing=items.map(it=>{
      if(it.creditPromo===true) return{...it,creditPrice:it.price,hasPromo:true};
      const cat=catalog.find(c=>c.id===it.id);
      const rate=cat&&cat.promoRate;
      return{...it,creditPrice:rate?parseFloat((it.price*(1-rate)).toFixed(2)):it.price,hasPromo:!!rate,promoRate:rate||0};
    });
    const creditSubtotal=itemsWithPricing.reduce((s,it)=>s+(it.creditPrice||0)+(it.warranty?it.warranty.price||0:0),0);
    const creditTotal=creditSubtotal+shipCost;
    const savings=parseFloat(Math.max(0,grandTotal-creditTotal).toFixed(2));
    const hasCreditPromo=savings>0;
    const alreadyCreditPriced=items.length>0&&items.every(it=>it.creditPromo===true);
    const showPromoOnCredit=hasCreditPromo&&!alreadyCreditPriced&&hasCredit;
    const activeTotal=isCreditSel&&showPromoOnCredit?creditTotal:grandTotal;

    // Past due / no credit banners
    const pastDueBanner=customer.pastDue?`
      <div style="padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--warning-border);background:var(--warning-light);margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;">
        <span style="flex-shrink:0;display:flex;color:var(--warning);margin-top:1px;">${icon('alertTriangle',14,'#D97B0D')}</span>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;"><strong style="color:var(--warning);">${es?'Cliente en mora':'Customer past due'}</strong> — ${es?`Q${(customer.pastDueAmount||0).toFixed(2)} pendientes. Sin crédito propio disponible.`:`Q${(customer.pastDueAmount||0).toFixed(2)} outstanding. Store credit unavailable.`}</div>
      </div>`:'';
    const prequalBanner=!hasCredit&&!customer.creditRejected&&!customer.pastDue?`
      <div style="padding:14px 16px;border-radius:var(--radius-sm);background:var(--primary-light);border:1.5px solid #C5D0F0;margin-bottom:14px;">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon('creditCard',18,'#2B5CE6')}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:3px;">${es?'¿Pagar a crédito?':'Pay on credit?'}</div>
          <div style="font-size:11px;color:var(--text-secondary);line-height:1.4;margin-bottom:10px;">${es?'Cliente sin pre-calificación vigente.':'Customer not yet pre-qualified.'}</div>
          <button class="btn btn-primary" id="btnPrequalFromPayment" style="padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:5px;">${icon('clipboardList',14)} ${es?'Pre-calificar':'Pre-qualify'}</button></div>
        </div>
      </div>`:'';

    // Cart items list — reactive prices
    const categoryIcon={moto:'🏍️',electronica:'📺',linea_blanca:'🧊',electrodomesticos:'🔌'};
    const itemsList=itemsWithPricing.map(it=>{
      const w=it.warranty?it.warranty.price||0:0;
      const dispPrice=(isCreditSel&&showPromoOnCredit&&it.hasPromo)?it.creditPrice:it.price;
      const dispTotal=dispPrice+w;
      const showDiscount=isCreditSel&&showPromoOnCredit&&it.hasPromo;
      const emoji=categoryIcon[it.category||'']||'📦';
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="width:36px;height:36px;border-radius:8px;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.name}</div>
          ${it.hasPromo&&hasCredit?`<div style="font-size:10px;color:var(--success);font-weight:600;margin-top:1px;display:flex;align-items:center;gap:3px;">${icon('tag',9,'var(--success)')} ${es?'Promo crédito':'Credit promo'} -${Math.round(it.promoRate*100)}%</div>`:''}
          ${w>0?`<div style="font-size:10px;color:var(--text-dim);margin-top:1px;">+ ${es?'Garantía':'Warranty'} Q${(w||0).toFixed(2)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${showDiscount?`<div style="font-size:10px;color:var(--text-dim);text-decoration:line-through;font-family:var(--mono);">Q${(it.price+w).toFixed(2)}</div>`:''}
          <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${showDiscount?'var(--success)':'var(--text)'};">Q${dispTotal.toFixed(2)}</div>
        </div>
      </div>`;
    }).join('');

    return`<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
      <div style="padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;">
        <span id="btnPaymentBack" style="cursor:pointer;display:flex;color:var(--text-dim);transform:rotate(180deg);">${icon('chevronRight',22)}</span>
        <div style="font-size:16px;font-weight:800;">${t('salesPayTitle')}</div>
      </div>
      <div style="flex:1;padding:16px;overflow-y:auto;padding-bottom:100px;">
        <div class="inner-container">
          ${pastDueBanner}${prequalBanner}

          <!-- ── Cart items ── -->
          <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px;overflow:hidden;">
            <div style="padding:10px 14px;background:var(--surface-alt);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;">
              <span style="display:flex;color:var(--text-dim);">${icon('shoppingCart',12)}</span>
              <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">${es?'Artículos':'Items'} (${items.length})</span>

            <div style="padding:0 14px;">
              ${itemsList}
              ${shipCost>0?`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);">
                <div style="display:flex;align-items:center;gap:8px;"><span style="display:flex;color:var(--text-dim);">${icon('home',14)}</span><span style="font-size:13px;color:var(--text-secondary);">${es?'Envío a domicilio':'Home delivery'}</span></div>
                <span style="font-family:var(--mono);font-size:13px;font-weight:600;">Q${shipCost.toFixed(2)}</span>

          ${hasCredit?`<div data-paymethod="credit" style="padding:14px;border-radius:var(--radius-sm);border:${isCreditSel?'2px solid var(--primary)':'1.5px solid var(--border)'};background:${isCreditSel?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .15s;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${isCreditSel?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;background:white;">${isCreditSel?`<div style="width:12px;height:12px;border-radius:50%;background:var(--primary);"></div>`:''}</div>
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:14px;font-weight:700;">${t('salesPayCredit')}</span>
                  ${showPromoOnCredit?`<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;background:var(--success);font-size:10px;font-weight:700;color:white;">${icon('tag',9,'white')} PROMO</span>`:''}
                </div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${t('salesPayCreditDesc')}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                ${showPromoOnCredit?`<div style="font-size:10px;color:var(--text-dim);text-decoration:line-through;font-family:var(--mono);">Q${grandTotal.toFixed(2)}</div>`:''}
                <div style="font-family:var(--mono);font-size:15px;font-weight:800;color:${showPromoOnCredit?'var(--success)':'var(--text)'};">Q${creditTotal.toFixed(2)}</div>
                ${showPromoOnCredit?`<div style="font-size:10px;color:var(--success);font-weight:700;">${es?'Ahorrás':'Save'} Q${savings.toFixed(2)}</div>`:''}
              </div>
            </div>
            ${isCreditSel?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #C5D0F0;font-size:11px;color:var(--text-dim);">${es?'Límite disponible':'Available limit'}: <strong style="font-family:var(--mono);color:var(--primary);">Q${mercLimit.toLocaleString('en')}</strong>${grandTotal>mercLimit?`<span style="color:var(--danger);font-weight:600;margin-left:8px;">${es?'Excede límite':'Exceeds limit'}</span>`:''}</div>`:''}
          </div>`:''}

          ${!alreadyCreditPriced?`<div data-paymethod="contado" style="padding:14px;border-radius:var(--radius-sm);border:${isContadoSel?'2px solid var(--primary)':'1.5px solid var(--border)'};background:${isContadoSel?'var(--primary-light)':'var(--white)'};cursor:pointer;transition:all .15s;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${isContadoSel?'var(--primary)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;background:white;">${isContadoSel?`<div style="width:12px;height:12px;border-radius:50%;background:var(--primary);"></div>`:''}</div>
              <div style="flex:1;">
                <div style="font-size:14px;font-weight:700;">${t('salesPayCard')}</div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${t('salesPayCardDesc')}</div>
              </div>
              <div style="font-family:var(--mono);font-size:15px;font-weight:800;">Q${grandTotal.toFixed(2)}</div>
            </div>
          </div>`:''}

/* ═══════════════ PERSIST SOLICITUD ═══════════════ */
function persistSolicitud({status,billingStatus}){
  const es=state.lang==='es';
  const ref='SOL-'+Math.floor(100000+Math.random()*900000);
  const isPre=state.action==='preapprove';
  const isCash=state.action==='cash';
  const hasMotoCart=(state.salesCartItems||[]).some(it=>it.category==='moto');
  const actionLabel=getProductLabel(state.action,state.outcome,hasMotoCart);
  const amt=state.action==='cart'?'Q'+(state.simCartTotal||0).toLocaleString('en',{minimumFractionDigits:2})
    :isCash?'Q'+(state.simCashAmt!==undefined?state.simCashAmt:9360).toLocaleString('en',{minimumFractionDigits:2}):'—';
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,'0'),mm=String(today.getMonth()+1).padStart(2,'0'),yy=today.getFullYear();
  const client=state.salesCustomer?state.salesCustomer.name
    :[state.pqData.firstName,state.pqData.secondName,state.pqData.lastName1,state.pqData.lastName2].filter(Boolean).join(' ')||'—';
  const doc=state.salesCustomer?state.salesCustomer.doc:((state.idType||'DPI')+' '+(state.idNumber||''));
  const phone=state.salesCustomer?.phone||state.pqData.phone||'+502 5890-1234';
  // For preapprove: no billing cycle — use 'activated' as terminal billingStatus
  const finalBillingStatus=isPre?'activated':billingStatus;
  const sol={
    ref,client,doc,product:actionLabel,amount:amt,
    date:dd+'/'+mm+'/'+yy,
    action:state.action,outcome:state.outcome,
    isNew:state.outcome===3,
    phone,
    prima:state.simPrima||0,
    status,billingStatus:finalBillingStatus,
    hasVisit:false,
    refs:[{name:'',phone:'',rel:''},{name:'',phone:'',rel:''}],
    uploads:{address:[...state.uploads.address],income:[...state.uploads.income],idFront:state.uploads.idFront,idBack:state.uploads.idBack},
    cartItems:state.salesCartItems?[...state.salesCartItems]:[],
    deliveryCost:state.simDeliveryCost||0,
    simPlazo:state.simPlazo,
    limitMerc:state.salesCustomer?.limitMerc||vpLimit(state.limitUpgraded?780:663,25,48),
    limitCash:state.salesCustomer?.limitCash||vpLimit(state.limitUpgraded?780:663,26,36),
    maxCuota:state.salesCustomer?.maxCuota||(state.limitUpgraded?780:663),
    cmmTotal:936,
    cmmComp:378.30,
  };
  // Build creditTerms from simulation state (skip for preapprove)
  if(!isPre){
    const commercialPlans=[
      {id:'default_tv',rate:24,gracia:{18:1,24:1,36:1,48:1}},
      {id:'samsung_tv',rate:18,gracia:{18:1,24:1,36:1,48:1}},
      {id:'lg_tv',rate:20,gracia:{18:1,24:1,36:1,48:1}},
      {id:'bf_tv',rate:14,gracia:{18:1,24:1,36:1}},
      {id:'zero_prima_tv',rate:22,gracia:{18:1,24:1}},
    ];
    const commercialPlansCash=[
      {id:'default_cash',rate:26,gracia:{18:1,24:1,36:1}},
      {id:'cash_promo',rate:22,gracia:{18:1,24:1}},
      {id:'cash_premium',rate:18,gracia:{18:1,24:1,36:1}},
    ];
    let ctRate,ctPlazo,ctGracia,ctFinanciado,ctCpi;
    if(isCash){
      const cp=commercialPlansCash.find(p=>p.id===(state.simCommPlanCash||'default_cash'))||commercialPlansCash[0];
      ctRate=cp.rate;
      ctPlazo=parseInt(state.simPlazoCash||'36');
      ctGracia=cp.gracia[ctPlazo]||0;
      ctFinanciado=state.simCashAmt!==undefined?state.simCashAmt:9360;
      ctCpi=state.simCPICash!==undefined?(state.simCPICash?27.30:0):27.30;
    } else {
      const cp=commercialPlans.find(p=>p.id===(state.simCommPlan||'default_tv'))||commercialPlans[0];
      ctRate=cp.rate;
      ctPlazo=parseInt(state.simPlazo||'24');
      ctGracia=cp.gracia[ctPlazo]||0;
      ctFinanciado=(state.simCartTotal||0)-(state.simPrima||0);
      ctCpi=state.simCPI?27.30:0;
    }
    const mr=ctRate/100/12;
    const ctCuota=mr>0?(ctFinanciado*mr*Math.pow(1+mr,ctPlazo))/(Math.pow(1+mr,ctPlazo)-1):ctFinanciado/ctPlazo;
    sol.creditTerms={montoFinanciar:ctFinanciado,plazo:ctPlazo,tasa:ctRate,gracia:ctGracia,cuota:Math.round(ctCuota*100)/100,cpi:ctCpi,cuotaTotal:Math.round((ctCuota+ctCpi)*100)/100};
  }
  state.solicitudes.unshift(sol);
  state.viewingSolicitud=sol;
  state.bioSent=false;
  state.bioVerified=false;
  state._detailOrigin=state.salesCustomer?'salesCart':'home';
}

  const cpSel=$('simCommPlan');if(cpSel)cpSel.onchange=e=>{state.simCommPlan=e.target.value;state.simPrima=undefined;state.simPlazo=undefined;render();};
  const cpSelM=$('simMotoPlan');if(cpSelM)cpSelM.onchange=e=>{state.simMotoPlan=e.target.value;state.simPrima=undefined;state.simPlazo=undefined;render();};
  const cpSelC=$('simCommPlanCash');if(cpSelC)cpSelC.onchange=e=>{state.simCommPlanCash=e.target.value;state.simPlazoCash=undefined;render();};
  // Limit modal
  const rl=$('btnRequestLimit');if(rl)rl.onclick=()=>{const m=$('limitModal');if(m)m.style.display='flex';};
  const al=$('btnAcceptLimit');if(al)al.onclick=()=>{state.limitUpgraded=true;render();};
  const dl=$('btnDeclineLimit');if(dl)dl.onclick=()=>{const m=$('limitModal');if(m)m.style.display='none';};
  const ul=$('btnUndoLimit');if(ul)ul.onclick=()=>{state.limitUpgraded=false;render();};
  // Warning options - cart
  const ew=$('btnExpandWarning');if(ew)ew.onclick=()=>{state.warningExpanded=!state.warningExpanded;render();};
  document.querySelectorAll('[data-woption]').forEach(el=>{el.onclick=()=>{
    const v=el.dataset.woption;
    if(v==='incremento'){const m=$('limitModal');if(m)m.style.display='flex';return;}
    if(v==='excepcion'){const m=$('mgrModal');if(m)m.style.display='flex';return;}
    state.warningOption=state.warningOption===v?'':v;
    render();
  };});
  const ma=$('btnMgrAuth');if(ma)ma.onclick=()=>{const c=$('mgrCode');if(c&&c.value.length>=3){state.mgrCode=c.value;state.mgrAuthorized=true;render();}};
  const mc=$('btnMgrCancel');if(mc)mc.onclick=()=>{const m=$('mgrModal');if(m)m.style.display='none';};
  // Warning options - cash
  const ewc=$('btnExpandWarningCash');if(ewc)ewc.onclick=()=>{state.warningExpandedCash=!state.warningExpandedCash;render();};
  document.querySelectorAll('[data-woptionc]').forEach(el=>{el.onclick=()=>{
    const v=el.dataset.woptionc;
    if(v==='incremento'){const m=$('limitModal');if(m)m.style.display='flex';return;}
    if(v==='excepcion'){const m=$('mgrModalCash');if(m)m.style.display='flex';return;}
    state.warningOptionCash=state.warningOptionCash===v?'':v;
    render();
  };});
  const mac=$('btnMgrAuthCash');if(mac)mac.onclick=()=>{const c=$('mgrCodeCash');if(c&&c.value.length>=3){state.mgrCodeCash=c.value;state.mgrAuthorizedCash=true;render();}};
  const mcc=$('btnMgrCancelCash');if(mcc)mcc.onclick=()=>{const m=$('mgrModalCash');if(m)m.style.display='none';};
  // Action
  document.querySelectorAll('.action-option').forEach(el=>{if(el.dataset.action)el.onclick=()=>{state.action=el.dataset.action;render();};});
  // AML
  document.querySelectorAll('[data-aml]').forEach(el=>{el.onclick=()=>{state.amlAnswers[el.dataset.aml]=el.dataset.val;render();};});
  // Uploads
  const ua=$('uploadAddress');if(ua)ua.onclick=()=>{const n=state.uploads.address.length+1;state.uploads.address.push('documento_domicilio_'+n+'.pdf');render();};
  const ui=$('uploadIncome');if(ui)ui.onclick=()=>{const n=state.uploads.income.length+1;state.uploads.income.push('comprobante_ingreso_'+n+'.pdf');render();};
  document.querySelectorAll('[data-rmaddr]').forEach(el=>{el.onclick=()=>{state.uploads.address.splice(parseInt(el.dataset.rmaddr),1);render();};});
  document.querySelectorAll('[data-rminc]').forEach(el=>{el.onclick=()=>{state.uploads.income.splice(parseInt(el.dataset.rminc),1);render();};});
  const uif=$('uploadIdFront');if(uif)uif.onclick=()=>{state.uploads.idFront=true;render();};
  const uib=$('uploadIdBack');if(uib)uib.onclick=()=>{state.uploads.idBack=true;render();};
  // Disbursement method
  document.querySelectorAll('[data-disb]').forEach(el=>{el.onclick=()=>{state.disbMethod=el.dataset.disb;render();};});
  const db=$('disbBank');if(db)db.onchange=e=>{state.disbBank=e.target.value;};
  const da=$('disbAccount');if(da)da.oninput=e=>{state.disbAccount=e.target.value;};
  // Visit scheduling
  document.querySelectorAll('[data-visitaddr]').forEach(el=>{el.onclick=()=>{state.visitAddr=el.dataset.visitaddr;render();};});
  document.querySelectorAll('[data-visitdate]').forEach(el=>{el.onclick=()=>{state.visitDate=el.dataset.visitdate;render();};});
  document.querySelectorAll('[data-visittime]').forEach(el=>{el.onclick=()=>{state.visitTime=el.dataset.visittime;render();};});
  // Nav - override for sales-wrapped credit flow (only AFTER action is chosen, not during prequal)
  const salesCreditFlow=!!state.salesCustomer&&!!state.action&&!state._legacyFlow&&!state._preapproveShortFlow&&['simulation','forkAml','aml','docScan','otp','application','forkApproval','done','rejected','approved'].includes(state.screen);
  const isPreApprovedFlow=state.outcome===2;
  const isLegacyFlow=!!(state._legacyFlow||state._preapproveShortFlow)&&!!state.salesCustomer&&!!state.action&&['forkAml','aml','docScan'].includes(state.screen);
  const bn=$('btnNext');if(bn&&!bn.disabled){
    if(isLegacyFlow){
      // Short flow: forkAml → [aml] → (docScan for legacy) → persist approved_pending_id
      const isPreapproveShort=!!state._preapproveShortFlow;
      bn.onclick=()=>{
        const s=state.screen;
        if(s==='forkAml'){
          state.screen=state.forkAml==='yes'?'aml':(isPreapproveShort?'_persist':'docScan');
          if(state.screen==='_persist'){
            // No AML, no docScan needed for preapprove (docs already captured in prequal)
            persistSolicitud({status:'approved_pending_id',billingStatus:null});
            state._preapproveShortFlow=false;state._legacyFlow=false;
            state.screen='approved';
          }
        } else if(s==='aml'){
          if(isPreapproveShort){
            // After AML, persist directly (no docScan for preapprove)
            persistSolicitud({status:'approved_pending_id',billingStatus:null});
            state._preapproveShortFlow=false;state._legacyFlow=false;
            state.screen='approved';
          } else {
            state.docScanStep=0;state.docScanPhase='select';state.docScanDocType=null;
            state.screen='docScan';
          }
        } else if(s==='docScan'){
          // Legacy only — documents captured, persist
          persistSolicitud({status:'approved_pending_id',billingStatus:null});
          state._legacyFlow=false;state._preapproveShortFlow=false;
          state.screen='approved';
        }
        render();
      };
    } else if(state._creditFromSales&&['prequal','sociodemo','forkSociodemo','otp'].includes(state.screen)){
      bn.onclick=()=>{
        const s=state.screen;
        if(s==='prequal'){
          // After prequal: if no-hit → sociodemo, if hit → otp, if rejected → rejected screen
          if(state.isHit==='rejected'){state.screen='rejected';render();return;}
          if(state.isHit===false){state.screen='sociodemo';render();return;}
          state.screen='otp';render();
        } else if(s==='sociodemo'){
          state.screen='forkSociodemo';render();
        } else if(s==='forkSociodemo'){
          if(state.forkSociodemo==='rejected'){state.screen='rejected';render();return;}
          state.screen='otp';render();
        } else if(s==='otp'){
          // After OTP: go back to salesCart with credit offer applied
          state.salesCustomer.isNewCredit=true;
          state.salesCustomer.maxCuota=state.limitUpgraded?780:663;
          const _cmmOtp=state.salesCustomer.maxCuota;
          state.salesCustomer.limitMerc=vpLimit(_cmmOtp,25,48);
          state.salesCustomer.limitMoto=vpLimit(_cmmOtp,25,60);
          state.salesCustomer.limitCash=vpLimit(_cmmOtp,26,36);
          state.salesCustomer.forkSociodemo=state.forkSociodemo||null;
          // Update name from prequal if available
          const pq=state.pqData;
          const updatedName=[pq.firstName,pq.secondName,pq.lastName1,pq.lastName2].filter(Boolean).join(' ');
          if(updatedName)state.salesCustomer.name=updatedName.toUpperCase();
          if(state.idType&&state.idNumber)state.salesCustomer.doc=state.idType+' '+state.idNumber;
          state._creditFromSales=false;
          state.screen='salesCart';state.salesSubScreen=null;state.salesTab='credit';
          render();
        }
      };
    } else if(salesCreditFlow){
      bn.onclick=()=>{
        const s=state.screen;
        if(isPreApprovedFlow){
          // Outcome 2: simulation → forkAml → [aml] → otp → persist + solDetail (pending_billing)
          if(s==='simulation'){state.screen='forkAml';}
          else if(s==='forkAml'){state.screen=state.forkAml==='yes'?'aml':'otp';}
          else if(s==='aml'){state.screen='otp';}
          else if(s==='otp'){
            // OTP verified → identity confirmed → persist as approved + pending_billing
            persistSolicitud({status:'approved',billingStatus:'pending_billing'});
            state.screen='approved';
          }
        } else {
          // Outcomes 0/1/3: simulation → forkAml → [aml] → docScan → application → forkApproval
          // For legacy customers: simulation → _legacyFlow (forkAml → [aml] → docScan → approved_pending_id)
          if(s==='simulation'){
            if(state.salesCustomer&&state.salesCustomer.isLegacy){
              // Activate legacy short flow after simulation
              state.forkAml=null;state.amlAnswers={};
              state.docScanStep=0;state.docScanPhase='select';state.docScanDocType=null;
              state.uploads={address:[],income:[],idFront:false,idBack:false};
              state._legacyFlow=true;
              state.screen='forkAml';
            } else {
              state.screen='forkAml';
            }
          }
          else if(s==='forkAml'){
            if(state.forkAml==='yes'){state.screen='aml';}
            else{state.docScanStep=0;state.docScanPhase='select';state.docScanDocType=null;state.screen='docScan';}
          }
          else if(s==='aml'){state.docScanStep=0;state.docScanPhase='select';state.docScanDocType=null;state.screen='docScan';}
          else if(s==='docScan'){state.screen='application';}
          else if(s==='application'){state.screen='forkApproval';}
          else if(s==='forkApproval'){
            if(state.forkApproval==='express'){
              // Express approval, no prior identity verification → persist as approved_pending_id
              persistSolicitud({status:'approved_pending_id',billingStatus:null});
              state.screen='approved';
            } else if(state.forkApproval==='rejected'){
              persistSolicitud({status:'rejected',billingStatus:null});
              state.screen='solRejected';
            } else {
              // Manual analysis
              state.screen='done';
            }
          }
        }
        render();
      };
    } else {
      bn.onclick=()=>nav(1);
    }
  }
  const bb=$('btnBack');if(bb){
    // Special case: salesCreate back should go to salesScenario when from sales flow
    if(state.screen==='salesCreate'&&!state.outcome){
      bb.onclick=()=>{state.screen='salesScenario';render();};
    } else if(state._creditFromSales&&['prequal','sociodemo','forkSociodemo','otp','rejected'].includes(state.screen)){
      // Credit origination started from sales cart — back goes to salesCart credit tab
      bb.onclick=()=>{
        const s=state.screen;
        if(s==='prequal'&&(state.prequalStep||0)>0){
          // Navigate within prequal steps first
          state.prequalStep=(state.prequalStep||0)-1;render();
        } else if(s==='sociodemo'){state.screen='prequal';render();}
        else if(s==='forkSociodemo'){state.screen='sociodemo';render();}
        else if(s==='otp'){
          const hasSocio=state.isHit===false;
          if(hasSocio)state.screen='forkSociodemo';
          else state.screen='prequal';
          render();
        }
        else {
          // First screen (prequal step 0) or rejected — go back to salesCart
          state._creditFromSales=false;state.outcome=null;state.action=null;
          state.screen='salesCart';state.salesSubScreen=null;state.salesTab='credit';render();
        }
      };
    } else if(salesCreditFlow){
      bb.onclick=()=>{
        const s=state.screen;
        if(s==='simulation'){
          const simOrigin=state._simOrigin;
          state.action=null;
          state._simOrigin=null;
          if(simOrigin==='payment'){
            state.screen='salesCart';state.salesSubScreen='payment';
          } else {
            state.screen='salesCart';state.salesSubScreen=null;state.salesTab='credit';
          }
        }
        else if(s==='forkAml'){state.screen='simulation';}
        else if(s==='aml'){
          if(state.action==='preapprove'){state.action=null;state.screen='salesCart';state.salesSubScreen=null;state.salesTab='credit';}
          else{state.screen='forkAml';}
        }
        else if(s==='docScan'){state.screen=state.forkAml==='yes'?'aml':'forkAml';}
        else if(s==='otp'&&isPreApprovedFlow){state.screen=state.forkAml==='yes'?'aml':'forkAml';}
        else if(s==='application'){state.screen='docScan';}
        else if(s==='forkApproval'){state.screen='application';}
        else{state.action=null;state.screen='salesCart';state.salesSubScreen=null;state.salesTab='credit';}
        render();
      };
    } else {
      bb.onclick=()=>nav(-1);
    }
  }
  const br=$('btnRestart');if(br)br.onclick=()=>{if(state._detailOrigin==='salesCart'){backFromDetail();}else{goHome();}};
  // Sale card clicks from dashboard — track origin
  document.querySelectorAll('[data-saleref]').forEach(el=>{el.onclick=()=>{const ref=el.dataset.saleref;const sale=(state.sales||[]).find(s=>s.ref===ref);if(sale){state._viewingSale=sale;state._detailOrigin=state.screen==='salesCart'?'salesCart':'home';state.screen='saleDetail';render();}};});
  // Sale detail back
  const bsdb=$('btnSaleDetailBack');if(bsdb)bsdb.onclick=()=>{state._viewingSale=null;if(state._detailOrigin==='salesCart'){state.screen='salesCart';state.salesTab='activity';state._detailOrigin=null;}else{state.screen='home';}render()};
  const brtc=$('btnRejectedBackToCart');if(brtc)brtc.onclick=()=>{
    if(state.salesCustomer)state.salesCustomer.creditRejected=true;
    state.action=null;state.forkAml=null;state.forkApproval=null;state.forkVisit=null;state.forkSociodemo=null;
    state.isHit=undefined;state.outcome=null;state.salesReturnToCheckout=false;
    state.screen='salesCart';state.salesSubScreen=null;state.salesTab='cart';
    render();
  };
}
render();
</script>
</body>
</html>
